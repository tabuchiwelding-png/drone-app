<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドローン飛行</title>
<script>const APP_VERSION = '7.0.0';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ===== CSS変数 ===== */
:root {
  --accent: #00ffb4;
  --accent2: #00ccff;
  --dim: rgba(0,255,180,0.35);
  --danger: #ff3b3b;
  --warn: #ffaa00;
  --panel: rgba(4,14,10,0.97);
  --border: rgba(0,255,180,0.18);
  --text: #d0fff0;
  --font: 'Courier New', monospace;
  --tab-h: 56px;
  --joy-size: 96px;
  --knob-size: 32px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:var(--font); color:var(--text); touch-action:none; }
#canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

/* ===== スキャンライン ===== */
#scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; z-index:10; }

/* ===== クロスヘア ===== */
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; pointer-events:none; z-index:20; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:var(--accent); opacity:0.45; }
#crosshair::before { top:50%;left:0;width:100%;height:1px;transform:translateY(-50%); }
#crosshair::after { left:50%;top:0;height:100%;width:1px;transform:translateX(-50%); }
.ch-c { position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:0.75; }
.tl{top:0;left:0;border-width:2px 0 0 2px}.tr{top:0;right:0;border-width:2px 2px 0 0}
.bl{bottom:0;left:0;border-width:0 0 2px 2px}.br{bottom:0;right:0;border-width:0 2px 2px 0}

/* ===== HUD上部 ===== */
#hud-top { position:fixed; top:0;left:0;right:0; padding:10px 14px 6px; display:flex; justify-content:space-between; z-index:30; background:linear-gradient(to bottom,rgba(0,0,0,0.82),transparent); pointer-events:none; }
.hud-b { display:flex;flex-direction:column;gap:2px; }
.hud-l { font-size:9px;color:var(--dim);letter-spacing:2px; }
.hud-v { font-size:17px;color:var(--accent);font-weight:bold;text-shadow:0 0 10px var(--accent); }
.hud-v.warn{color:var(--warn)}.hud-v.danger{color:var(--danger);animation:blink 0.5s infinite;}

/* ===== コンパス ===== */
#compass { position:fixed; top:58px; left:50%; transform:translateX(-50%); text-align:center; z-index:30; pointer-events:none; }
#compass-dir { font-size:15px;color:var(--accent);display:block;text-shadow:0 0 8px var(--accent); }
#coords-display { font-size:9px;color:var(--dim); }

/* ===== ピッチ表示 ===== */
#pitch-indicator { position:fixed; right:14px; top:50%; transform:translateY(-50%); z-index:30; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:2px; }
.pitch-bar { width:3px; height:60px; background:var(--border); border-radius:2px; position:relative; overflow:visible; }
.pitch-fill { position:absolute; width:3px; background:var(--accent); border-radius:2px; bottom:50%; transition:height 0.1s; }
.pitch-lbl { font-size:8px; color:var(--dim); }
#pitch-val { font-size:10px; color:var(--accent2); }

/* ===== 速度モード ===== */
#speed-mode { position:fixed; top:58px; left:14px; z-index:35; display:flex; flex-direction:column; gap:4px; }
.spd-btn { background:var(--panel); border:1px solid var(--border); color:var(--dim); font-family:var(--font); font-size:9px; padding:5px 10px; cursor:pointer; min-height:44px; }
.spd-btn.active { background:rgba(0,255,180,0.15); border-color:var(--accent); color:var(--accent); }

/* ===== 自動飛行 ===== */
#auto-btn { position:fixed; top:58px; right:52px; z-index:35; background:var(--panel); border:1px solid var(--border); color:var(--accent); font-family:var(--font); font-size:9px; padding:6px 10px; cursor:pointer; min-height:44px; }
#auto-btn.active{background:rgba(0,255,180,0.2);border-color:var(--accent);}

/* ===== 視点リセット ===== */
#view-reset { position:fixed; top:58px; right:14px; z-index:35; background:var(--panel); border:1px solid var(--border); color:var(--accent2); font-family:var(--font); font-size:9px; padding:6px 8px; cursor:pointer; min-height:44px; }

/* ===== タブバー ===== */
#tabbar { position:fixed; bottom:0;left:0;right:0; height:var(--tab-h); background:rgba(2,8,6,0.97); border-top:1px solid var(--border); display:flex; z-index:100; }
.tab-btn { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:var(--font);font-size:9px;padding-bottom:4px;min-height:44px; }
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:20px;}

/* ===== パネル ===== */
.panel{position:fixed;bottom:var(--tab-h);left:0;right:0;background:var(--panel);border-top:1px solid var(--border);z-index:50;display:none;overflow-y:auto;max-height:72vh;}
.panel.active{display:block;}
.panel-title{font-size:11px;color:var(--accent);letter-spacing:3px;padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.section-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;padding:10px 16px 6px;}

/* ===== 操作UI ===== */
#fly-controls{position:fixed;bottom:var(--tab-h);left:0;right:0;padding:6px 12px 8px;background:linear-gradient(to top,rgba(0,0,0,0.94),transparent);z-index:40;}
#status-row{display:flex;justify-content:space-between;margin-bottom:6px;padding:4px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.s-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite;}
.s-dot.warn{background:var(--warn);}
.s-lbl{font-size:8px;color:var(--dim);}

/* ===== ジョイスティック ===== */
#ctrl-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.joy-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.joy-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;}
.joy-sub{font-size:7px;color:rgba(0,255,180,0.2);text-align:center;line-height:1.3;}
.joy-base{width:var(--joy-size);height:var(--joy-size);border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.88);position:relative;touch-action:none;}
.joy-ring{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,255,180,0.08);}
.joy-knob{position:absolute;width:var(--knob-size);height:var(--knob-size);border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(0,255,180,0.95),rgba(0,200,140,0.5));border:1.5px solid var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(0,255,180,0.55);pointer-events:none;}
.joy-knob.cam{background:radial-gradient(circle at 35% 35%,rgba(0,204,255,0.95),rgba(0,160,200,0.5));border-color:var(--accent2);box-shadow:0 0 14px rgba(0,204,255,0.55);}

/* ===== 高度・スロットル中央 ===== */
.center-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.alt-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.85);color:var(--accent);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;}
.alt-btn:active{background:rgba(0,255,180,0.15);}
.alt-info{display:flex;flex-direction:column;align-items:center;}
.alt-num{font-size:15px;color:var(--accent);font-weight:bold;}
.alt-unit{font-size:8px;color:var(--dim);}

/* ===== 出発地パネル ===== */
#panel-depart{padding:0 0 16px;}
.city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px;}
.city-btn{background:rgba(0,20,15,0.8);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:10px 4px;cursor:pointer;text-align:center;line-height:1.4;min-height:64px;}
.city-btn.selected{background:rgba(0,255,180,0.15);border-color:var(--accent);color:var(--accent);}
.city-flag{font-size:18px;display:block;}.city-name{font-size:10px;display:block;margin-top:2px;}
.input-row{display:flex;gap:8px;padding:8px 12px 0;}
.addr-input{flex:1;background:rgba(0,20,15,0.9);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:10px 12px;outline:none;}
.addr-input:focus{border-color:var(--accent);}
.addr-input::placeholder{color:var(--dim);font-size:11px;}
.search-btn{background:rgba(0,255,180,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:11px;padding:10px 14px;cursor:pointer;white-space:nowrap;min-height:44px;}
.coord-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 12px 0;}
.fly-start-btn{margin:12px 12px 0;width:calc(100% - 24px);background:linear-gradient(135deg,rgba(0,255,180,0.2),rgba(0,200,140,0.1));border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:13px;letter-spacing:3px;padding:14px;cursor:pointer;text-align:center;min-height:52px;}

/* ===== ログパネル ===== */
#panel-log{padding:0 0 16px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(0,255,180,0.07);}
.log-place{font-size:12px;color:var(--text);}
.log-time{font-size:9px;color:var(--dim);}
.log-fly-btn{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--font);font-size:9px;padding:6px 12px;cursor:pointer;min-height:44px;}
.log-empty{text-align:center;color:var(--dim);font-size:11px;padding:30px;}

/* ===== ローディング ===== */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
#loading h2{color:var(--accent);letter-spacing:6px;font-size:16px;text-shadow:0 0 20px var(--accent);}
.load-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-fill{height:100%;background:var(--accent);animation:ldanim 1.8s ease forwards;}
@keyframes ldanim{from{width:0}to{width:100%}}
#loading p{font-size:10px;color:var(--dim);letter-spacing:3px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== 操作ガイド ===== */
#guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
#guide-overlay h3{color:var(--accent);letter-spacing:4px;font-size:13px;}
.guide-row{display:flex;gap:20px;}
.guide-item{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(0,30,20,0.8);border:1px solid var(--border);padding:12px 16px;min-width:130px;}
.guide-icon{font-size:24px;}
.guide-title{font-size:10px;color:var(--accent);letter-spacing:2px;}
.guide-desc{font-size:9px;color:var(--dim);text-align:center;line-height:1.6;}
#guide-close{background:rgba(0,255,180,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:12px;letter-spacing:3px;padding:12px 32px;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>

<!-- ===== ローディング ===== -->
<div id="loading">
  <h2>◈ ドローン飛行</h2>
  <div class="load-bar"><div class="load-fill"></div></div>
  <p>3D世界を構築中...</p>
</div>

<!-- ===== 操作ガイド ===== -->
<div id="guide-overlay">
  <h3>◈ 操作方法</h3>
  <div class="guide-row">
    <div class="guide-item">
      <span class="guide-icon">🕹️</span>
      <span class="guide-title">左スティック</span>
      <span class="guide-desc">前後左右に<br>移動する</span>
    </div>
    <div class="guide-item">
      <span class="guide-icon">👁️</span>
      <span class="guide-title">右スティック</span>
      <span class="guide-desc">視界・向きを<br>上下左右に回す</span>
    </div>
  </div>
  <div class="guide-row">
    <div class="guide-item">
      <span class="guide-icon">▲▼</span>
      <span class="guide-title">中央ボタン</span>
      <span class="guide-desc">高度を<br>上下に変える</span>
    </div>
    <div class="guide-item">
      <span class="guide-icon">🔄</span>
      <span class="guide-title">視点リセット</span>
      <span class="guide-desc">右上ボタンで<br>正面に戻る</span>
    </div>
  </div>
  <button id="guide-close" onclick="closeGuide()">◈ 飛行開始</button>
</div>

<canvas id="canvas"></canvas>
<div id="scanlines"></div>
<div id="crosshair">
  <div class="ch-c tl"></div><div class="ch-c tr"></div>
  <div class="ch-c bl"></div><div class="ch-c br"></div>
</div>

<!-- ===== HUD ===== -->
<div id="hud-top">
  <div class="hud-b"><span class="hud-l">高度</span><span class="hud-v" id="alt-display">30m</span></div>
  <div class="hud-b" style="align-items:center"><span class="hud-l">◈ ドローン飛行</span><span class="hud-v" style="font-size:11px" id="mode-display">手動</span></div>
  <div class="hud-b" style="align-items:flex-end"><span class="hud-l">速度</span><span class="hud-v" id="spd-display">0 km/h</span><span style="font-size:8px;color:var(--dim)" id="ver-display">v6.0.0</span></div>
</div>
<div id="compass"><span id="compass-dir">北</span><span id="coords-display">35.6895°N 139.6917°E</span></div>

<!-- ===== ピッチ表示 ===== -->
<div id="pitch-indicator">
  <span class="pitch-lbl">仰角</span>
  <div class="pitch-bar"><div class="pitch-fill" id="pitch-fill"></div></div>
  <span id="pitch-val">0°</span>
</div>

<!-- ===== 速度モード ===== -->
<div id="speed-mode">
  <button class="spd-btn active" id="spd-slow" onclick="setSpeed('slow')">低速</button>
  <button class="spd-btn" id="spd-mid" onclick="setSpeed('mid')">中速</button>
  <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">高速</button>
</div>

<button id="auto-btn" onclick="toggleAuto()">自動飛行</button>
<button id="view-reset" onclick="resetView()" title="視点リセット">👁</button>

<!-- ===== 操作コントロール ===== -->
<div id="fly-controls">
  <div id="status-row">
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">GPS</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">通信</span></div>
    <div class="s-item"><div class="s-dot" id="bat-dot"></div><span class="s-lbl" id="bat-lbl">電池100%</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl" id="city-lbl">東京</span></div>
  </div>
  <div id="ctrl-row">
    <!-- 左スティック：移動 -->
    <div class="joy-wrap">
      <span class="joy-lbl">移動</span>
      <div class="joy-base" id="joy-move"><div class="joy-ring"></div><div class="joy-knob" id="knob-move"></div></div>
      <span class="joy-sub">前後/左右</span>
    </div>
    <!-- 中央：高度 -->
    <div class="center-col">
      <button class="alt-btn" id="btn-up">▲</button>
      <div class="alt-info"><span class="alt-num" id="alt-num">30</span><span class="alt-unit">メートル</span></div>
      <button class="alt-btn" id="btn-down">▼</button>
    </div>
    <!-- 右スティック：視界（カメラ回転） -->
    <div class="joy-wrap">
      <span class="joy-lbl" style="color:var(--accent2)">視界</span>
      <div class="joy-base" id="joy-cam"><div class="joy-ring"></div><div class="joy-knob cam" id="knob-cam"></div></div>
      <span class="joy-sub">上下/左右</span>
    </div>
  </div>
</div>

<!-- ===== 出発地パネル ===== -->
<div class="panel" id="panel-depart">
  <div class="panel-title">◈ 出発地を選ぶ</div>
  <div class="section-lbl">▸ 人気の都市</div>
  <div class="city-grid">
    <button class="city-btn" onclick="flyTo(35.6895,139.6917,'東京',this)"><span class="city-flag">🗼</span><span class="city-name">東京</span></button>
    <button class="city-btn" onclick="flyTo(34.6937,135.5023,'大阪',this)"><span class="city-flag">🏯</span><span class="city-name">大阪</span></button>
    <button class="city-btn" onclick="flyTo(35.0116,135.7681,'京都',this)"><span class="city-flag">⛩️</span><span class="city-name">京都</span></button>
    <button class="city-btn" onclick="flyTo(26.2124,127.6809,'沖縄',this)"><span class="city-flag">🌊</span><span class="city-name">沖縄</span></button>
    <button class="city-btn" onclick="flyTo(43.0642,141.3469,'札幌',this)"><span class="city-flag">❄️</span><span class="city-name">札幌</span></button>
    <button class="city-btn" onclick="flyTo(33.5904,130.4017,'福岡',this)"><span class="city-flag">🎋</span><span class="city-name">福岡</span></button>
    <button class="city-btn" onclick="flyTo(35.3606,138.7274,'富士山',this)"><span class="city-flag">🗻</span><span class="city-name">富士山</span></button>
    <button class="city-btn" onclick="flyTo(40.7128,-74.006,'NY',this)"><span class="city-flag">🗽</span><span class="city-name">NY</span></button>
    <button class="city-btn" onclick="flyTo(48.8566,2.3522,'パリ',this)"><span class="city-flag">🇫🇷</span><span class="city-name">パリ</span></button>
    <button class="city-btn" onclick="flyTo(25.2048,55.2708,'ドバイ',this)"><span class="city-flag">🌆</span><span class="city-name">ドバイ</span></button>
    <button class="city-btn" onclick="flyTo(51.5074,-0.1278,'ロンドン',this)"><span class="city-flag">🎡</span><span class="city-name">ロンドン</span></button>
    <button class="city-btn" onclick="flyTo(-33.8688,151.2093,'シドニー',this)"><span class="city-flag">🦘</span><span class="city-name">シドニー</span></button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 住所・場所で検索</div>
  <div class="input-row">
    <input class="addr-input" id="addr-input" type="text" placeholder="例：渋谷スクランブル交差点..."/>
    <button class="search-btn" onclick="searchAddress()">検索</button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 座標で指定</div>
  <div class="coord-row">
    <input class="addr-input" id="lat-input" type="number" placeholder="緯度 35.6762" step="0.0001"/>
    <input class="addr-input" id="lng-input" type="number" placeholder="経度 139.6503" step="0.0001"/>
  </div>
  <div class="input-row" style="margin-top:0"><button class="search-btn" style="flex:1" onclick="flyToCoords()">この座標へ移動</button></div>
  <button class="fly-start-btn" onclick="startFlight()">◈ 飛行開始</button>
</div>

<!-- ===== ログパネル ===== -->
<div class="panel" id="panel-log">
  <div class="panel-title">◈ 飛行記録</div>
  <div id="log-list"><div class="log-empty">まだ記録がありません</div></div>
</div>

<!-- ===== タブバー ===== -->
<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('fly')"><span class="tab-icon">🚁</span>飛行</button>
  <button class="tab-btn" onclick="switchTab('depart')"><span class="tab-icon">📍</span>出発地</button>
  <button class="tab-btn" onclick="switchTab('log')"><span class="tab-icon">📋</span>記録</button>
</div>

<script>
// ===== 定数 =====
const DIRS = ['北','北東','東','南東','南','南西','西','北西'];
const SPEED_MAP = { slow:12, mid:50, fast:200 };
const MIN_ALT = 3;    // 最低高度(m)
const MAX_ALT = 2000;
const CAM_PITCH_MIN = -80; // 最大下向き
const CAM_PITCH_MAX = 60;  // 最大上向き
const JOY_R = 32;

// ===== 状態 =====
const S = {
  lat:35.6895, lng:139.6917, alt:30,
  heading:0,       // ドローンの向き(yaw) deg
  camPitch:-8,     // カメラの上下角度 deg（負=下向き）
  camYawOffset:0,  // カメラのヨーオフセット(視界だけ回転)
  speed:0, speedMode:'slow',
  autoFly:false, autoAngle:0,
  battery:100,
  // 左スティック（移動）
  moveActive:false, moveDx:0, moveDy:0,

// ===== 地面テクスチャ（Canvas生成） =====
function makeGroundTexture() {
  const sz = 512;
  const cv = document.createElement('canvas');
  cv.width = cv.height = sz;
  const ctx = cv.getContext('2d');
  // ベース：草地
  ctx.fillStyle = '#4a7c3f';
  ctx.fillRect(0, 0, sz, sz);
  // 区画ごとに色を変える（住宅地・公園・駐車場）
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const x = c * 128, y = r * 128;
      const t = Math.random();
      if (t < 0.3) {
        // 舗装地
        ctx.fillStyle = `hsl(0,0%,${38 + Math.random()*10}%)`;
        ctx.fillRect(x+4, y+4, 120, 120);
      } else if (t < 0.55) {
        // 公園
        ctx.fillStyle = `hsl(${110+Math.random()*20},${50+Math.random()*20}%,${32+Math.random()*8}%)`;
        ctx.fillRect(x+4, y+4, 120, 120);
      }
      // それ以外はベースの草地のまま
    }
  }
  // 道路線
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(0, 120, sz, 16);
  ctx.fillRect(0, 248, sz, 16);
  ctx.fillRect(0, 376, sz, 16);
  ctx.fillRect(120, 0, 16, sz);
  ctx.fillRect(248, 0, 16, sz);
  ctx.fillRect(376, 0, 16, sz);
  // 車線中央線
  ctx.strokeStyle = '#ffdd00';
  ctx.lineWidth = 2;
  ctx.setLineDash([16, 16]);
  ctx.beginPath(); ctx.moveTo(0, 128); ctx.lineTo(sz, 128); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(sz, 256); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 384); ctx.lineTo(sz, 384); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(128, 0); ctx.lineTo(128, sz); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(256, 0); ctx.lineTo(256, sz); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(384, 0); ctx.lineTo(384, sz); ctx.stroke();
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(40, 40);
  return tex;
}

// ===== 建物窓テクスチャ（Canvas生成） =====
// タイプ別にテクスチャをキャッシュ
const buildingTexCache = {};
function makeBuildingTex(type) {
  if (buildingTexCache[type]) return buildingTexCache[type];
  const sz = 256;
  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const ctx = cv.getContext('2d');

  if (type === 'office') {
    // オフィスビル：濃いガラスカーテンウォール
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(0, 0, sz, sz);
    // 縦横の仕切り
    ctx.fillStyle = '#0d1520';
    for (let x = 0; x < sz; x += 32) ctx.fillRect(x, 0, 3, sz);
    for (let y = 0; y < sz; y += 24) ctx.fillRect(0, y, sz, 3);
    // 窓（ランダムに点灯）
    for (let col = 0; col < 7; col++) {
      for (let row = 0; row < 9; row++) {
        const wx = col * 32 + 5, wy = row * 24 + 5;
        const ww = 22, wh = 14;
        const lit = Math.random();
        if (lit < 0.55) {
          // 点灯
          const r = 200 + Math.random()*55, g = 220 + Math.random()*35, b = 180 + Math.random()*75;
          ctx.fillStyle = `rgb(${r},${g},${b})`;
        } else if (lit < 0.75) {
          // 薄く点灯
          ctx.fillStyle = '#aabbcc';
        } else {
          // 消灯
          ctx.fillStyle = '#0e1c2b';
        }
        ctx.fillRect(wx, wy, ww, wh);
      }
    }
  } else if (type === 'residential') {
    // マンション：ベージュ壁＋小さい窓
    const wallH = `hsl(${30+Math.random()*20},${15+Math.random()*15}%,${62+Math.random()*12}%)`;
    ctx.fillStyle = wallH;
    ctx.fillRect(0, 0, sz, sz);
    // 横の帯（階層の区切り）
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let y = 0; y < sz; y += 36) ctx.fillRect(0, y+32, sz, 4);
    // 窓
    for (let col = 0; col < 5; col++) {
      for (let row = 0; row < 6; row++) {
        const wx = col * 46 + 10, wy = row * 36 + 8;
        const lit = Math.random();
        ctx.fillStyle = lit < 0.4 ? '#ffe8a0' : lit < 0.6 ? '#b0c8e0' : '#445';
        ctx.fillRect(wx, wy, 26, 20);
        // サッシ
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(wx+12, wy, 2, 20);
        ctx.fillRect(wx, wy+10, 26, 2);
      }
    }
  } else {
    // 低層・商業：看板風、明るい壁
    ctx.fillStyle = `hsl(${200+Math.random()*40},${20+Math.random()*20}%,${55+Math.random()*15}%)`;
    ctx.fillRect(0, 0, sz, sz);
    // 大きいショーウィンドウ風
    ctx.fillStyle = 'rgba(180,220,255,0.55)';
    ctx.fillRect(20, 40, sz-40, 80);
    ctx.fillStyle = 'rgba(180,220,255,0.4)';
    ctx.fillRect(20, 150, sz-40, 60);
    // 縁
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
    ctx.strokeRect(20, 40, sz-40, 80);
    ctx.strokeRect(20, 150, sz-40, 60);
  }

  const tex = new THREE.CanvasTexture(cv);
  buildingTexCache[type] = tex;
  return tex;
}

// ===== 建物生成 =====
function createBuildings() {
  const rand = (a,b) => a + Math.random()*(b-a);
  const baseColors = {
    office:      [0x1e3248, 0x2a3f52, 0x243344, 0x1a2d40, 0x304050],
    residential: [0xc8b89a, 0xd4c4a8, 0xbfb090, 0xc9bba0, 0xe0d0b8],
    low:         [0x7a8fa0, 0x8fa0b0, 0x6e8292, 0x9aaabb, 0x607080],
  };

  for (let bx = -2500; bx <= 2500; bx += 100) {
    for (let bz = -2500; bz <= 2500; bz += 100) {
      if (Math.random() < 0.55) {
        // 建物タイプを決める
        const r = Math.random();
        let type, h, w, d;
        if (r < 0.3) {
          type = 'office';
          w = rand(22, 50); d = rand(22, 50); h = rand(40, 140);
        } else if (r < 0.72) {
          type = 'residential';
          w = rand(18, 38); d = rand(18, 38); h = rand(12, 55);
        } else {
          type = 'low';
          w = rand(20, 55); d = rand(20, 55); h = rand(4, 18);
        }

        const cx = bx + rand(-38, 38);
        const cz = bz + rand(-38, 38);
        const palette = baseColors[type];
        const baseColor = palette[Math.floor(Math.random() * palette.length)];
        const tex = makeBuildingTex(type);

        // 側面マテリアル：テクスチャ面×4 + 屋上・底面はベタ色
        const roofColor = type === 'office' ? 0x1a2530 : type === 'residential' ? 0x888070 : 0x607080;
        const materials = [
          new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),   // +X
          new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),   // -X
          new THREE.MeshLambertMaterial({ color: roofColor }),              // +Y 屋上
          new THREE.MeshLambertMaterial({ color: 0x111111 }),               // -Y 底面
          new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),   // +Z
          new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),   // -Z
        ];

        const geo = new THREE.BoxGeometry(w, h, d);
        const mesh = new THREE.Mesh(geo, materials);
        mesh.position.set(cx, h/2, cz);
        scene.add(mesh);

        // 屋上の縁（同じcx,czを使う）
        const rimH = type === 'office' ? 2.0 : 1.0;
        const rimGeo = new THREE.BoxGeometry(w + 0.6, rimH, d + 0.6);
        const rimMat = new THREE.MeshLambertMaterial({ color: roofColor });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(cx, h + rimH/2, cz);
        scene.add(rim);

        // オフィスビルに屋上設備（給水塔・空調）
        if (type === 'office' && h > 50) {
          // 給水塔
          const tankGeo = new THREE.CylinderGeometry(1.5, 1.5, 4, 8);
          const tankMat = new THREE.MeshLambertMaterial({ color: 0x8899aa });
          const tank = new THREE.Mesh(tankGeo, tankMat);
          tank.position.set(cx + rand(-w/4, w/4), h + rimH + 2, cz + rand(-d/4, d/4));
          scene.add(tank);
          // アンテナ
          const antGeo = new THREE.CylinderGeometry(0.15, 0.15, rand(4, 10), 4);
          const antMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
          const ant = new THREE.Mesh(antGeo, antMat);
          ant.position.set(cx + rand(-w/3, w/3), h + rimH + rand(2, 5) + 3, cz + rand(-d/3, d/3));
          scene.add(ant);
        }
      }
    }
  }
}

// ===== カメラ更新 =====
// ドローンは世界座標(0,S.alt,0)固定、ワールドを動かす方式
function updateCamera() {
  camera.position.set(0, S.alt, 0);
  camera.rotation.y = -S.heading * Math.PI / 180;
  camera.rotation.x = S.camPitch * Math.PI / 180;
}

// ===== メインループ =====
let lastTime = 0;
function mainLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05); // 最大50ms
  lastTime = ts;

  if (S.autoFly) {
    // 自動飛行モード
    S.autoAngle += dt * 0.5;
    S.heading = (S.heading + dt * 18) % 360;
    S.speed = 35;
    S.alt = Math.max(MIN_ALT, 30 + Math.sin(S.autoAngle) * 20);
    const headRad = S.heading * Math.PI / 180;
    scene.position.x -= Math.sin(headRad) * 0.45;
    scene.position.z -= Math.cos(headRad) * 0.45;
  } else {
    // 手動操作：左スティック = heading方向に移動（視界と完全分離）
    if (S.moveActive) {
      const spd = SPEED_MAP[S.speedMode];
      const headRad = S.heading * Math.PI / 180;
      const fwd = -S.moveDy;  // 前後
      const str = S.moveDx;   // 左右
      const mv = spd * dt;
      const mag = Math.min(1, Math.sqrt(S.moveDx**2 + S.moveDy**2));
      scene.position.x -= (Math.sin(headRad)*fwd + Math.cos(headRad)*str) * mv;
      scene.position.z -= (Math.cos(headRad)*fwd - Math.sin(headRad)*str) * mv;
      S.speed = Math.round(spd * mag * 3.6 * 0.1);
      S.lat -= (Math.cos(headRad)*fwd - Math.sin(headRad)*str) * mv * 0.000009;
      S.lng += (Math.sin(headRad)*fwd + Math.cos(headRad)*str) * mv * 0.000009;
    } else {
      S.speed = Math.max(0, S.speed - 2);
    }

    // 右スティック：カメラのみ回転（移動に影響しない）
    if (S.camActive) {
      // 左右 → heading（ドローン本体の向き）を変える
      S.heading = (S.heading + S.camDx * 2.0 + 360) % 360;
      // 上下 → カメラピッチのみ
      S.camPitch = Math.max(CAM_PITCH_MIN, Math.min(CAM_PITCH_MAX, S.camPitch - S.camDy * 1.8));
    }
  }

  // 高度更新
  if (S.altDir !== 0) {
    const altSpd = S.speedMode === 'fast' ? 8 : S.speedMode === 'mid' ? 4 : 2;
    S.alt = Math.max(MIN_ALT, Math.min(MAX_ALT, S.alt + S.altDir * altSpd));
  }

  updateCamera();
  updateHUD();
}

// ===== HUD更新 =====
function updateHUD() {
  const altEl = document.getElementById('alt-display');
  altEl.textContent = Math.round(S.alt) + 'm';
  altEl.className = 'hud-v' + (S.alt < 5 ? ' danger' : S.alt < 15 ? ' warn' : '');
  document.getElementById('spd-display').textContent = Math.round(S.speed) + ' km/h';
  document.getElementById('alt-num').textContent = Math.round(S.alt);
  document.getElementById('coords-display').textContent = S.lat.toFixed(4) + '°N ' + S.lng.toFixed(4) + '°E';
  document.getElementById('mode-display').textContent = S.autoFly ? '自動飛行' : '手動';
  const di = Math.round(((S.heading % 360) + 360) % 360 / 45) % 8;
  document.getElementById('compass-dir').textContent = DIRS[di];
  // ピッチ表示
  const pct = Math.max(0, Math.min(100, (S.camPitch - CAM_PITCH_MIN) / (CAM_PITCH_MAX - CAM_PITCH_MIN) * 100));
  document.getElementById('pitch-fill').style.height = pct + '%';
  document.getElementById('pitch-val').textContent = Math.round(S.camPitch) + '°';
}

// ===== ジョイスティック =====
function setupJoy(baseId, knobId, onMove, onEnd) {
  const base = document.getElementById(baseId);
  const knob = document.getElementById(knobId);
  let sx = 0, sy = 0;
  let touchId = null;

  function applyMove(rawDx, rawDy) {
    const dist = Math.sqrt(rawDx*rawDx + rawDy*rawDy);
    let dx = rawDx, dy = rawDy;
    if (dist > JOY_R) { dx = rawDx/dist*JOY_R; dy = rawDy/dist*JOY_R; }
    onMove(dx/JOY_R, dy/JOY_R);
    knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }

  // タッチ：IDで追跡（他の指の影響を受けない）
  base.addEventListener('touchstart', e => {
    e.preventDefault();
    if (touchId !== null) return;
    const t = e.changedTouches[0];
    touchId = t.identifier;
    const r = base.getBoundingClientRect();
    sx = r.left + r.width / 2;
    sy = r.top + r.height / 2;
    applyMove(t.clientX - sx, t.clientY - sy);
  }, { passive: false });

  base.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) {
        applyMove(t.clientX - sx, t.clientY - sy);
        break;
      }
    }
  }, { passive: false });

  function onTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) {
        touchId = null;
        onEnd();
        knob.style.transform = 'translate(-50%, -50%)';
        break;
      }
    }
  }
  base.addEventListener('touchend', onTouchEnd);
  base.addEventListener('touchcancel', onTouchEnd);

  // マウス：base要素内のみ（windowに登録しない）
  let mouseDown = false;
  base.addEventListener('mousedown', e => {
    mouseDown = true;
    const r = base.getBoundingClientRect();
    sx = r.left + r.width / 2;
    sy = r.top + r.height / 2;
    applyMove(e.clientX - sx, e.clientY - sy);
  });
  base.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    applyMove(e.clientX - sx, e.clientY - sy);
  });
  const stopMouse = () => { if (mouseDown) { mouseDown = false; onEnd(); knob.style.transform = 'translate(-50%, -50%)'; } };
  base.addEventListener('mouseup', stopMouse);
  base.addEventListener('mouseleave', stopMouse);
}

async function searchAddress() {
  const q = document.getElementById('addr-input').value.trim();
  if (!q) return;
  try {
    const res = await fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=1');
    const data = await res.json();
    if (data.length > 0) {
      flyTo(parseFloat(data[0].lat), parseFloat(data[0].lon), q, null);
      alert('「' + q + '」が見つかりました！飛行開始を押してください。');
    } else { alert('場所が見つかりませんでした。'); }
  } catch(e) { alert('検索エラーが発生しました。'); }
}

function flyToCoords() {
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  if (isNaN(lat) || isNaN(lng)) { alert('緯度・経度を正しく入力してください'); return; }
  flyTo(lat, lng, lat.toFixed(3)+','+lng.toFixed(3), null);
}

  renderLog();

function renderLog() {
  const el = document.getElementById('log-list');
  if (!S.log.length) { el.innerHTML = '<div class="log-empty">まだ記録がありません</div>'; return; }
  el.innerHTML = S.log.slice(0, 20).map(e =>
    `<div class="log-item"><div><div class="log-place">📍 ${e.place}</div><div class="log-time">${e.time}</div></div><button class="log-fly-btn" onclick="flyTo(${e.lat},${e.lng},'${e.place}',null);switchTab('fly')">再訪</button></div>`
  ).join('');
}

// ===== 起動 =====
document.getElementById('ver-display').textContent = 'v' + APP_VERSION;
updateCamera();
requestAnimationFrame(animate);
setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1400);

// ===== visibilitychange（iOSキャッシュ対策） =====
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    const saved = localStorage.getItem('drone_version_v1');
    if (saved && saved !== APP_VERSION) {
      window.location.reload(true);
    }
    localStorage.setItem('drone_version_v1', APP_VERSION);
  }
});
localStorage.setItem('drone_version_v1', APP_VERSION);
</script>
