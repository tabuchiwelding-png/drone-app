<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドローン飛行</title>
<script>const APP_VERSION = '2.0.0';</script>
<style>
:root {
  --bg: #080b0f;
  --accent: #00ffb4;
  --accent2: #00c8ff;
  --dim: rgba(0,255,180,0.3);
  --danger: #ff3b3b;
  --warn: #ffaa00;
  --panel: rgba(5,18,14,0.97);
  --border: rgba(0,255,180,0.18);
  --text: #d0fff0;
  --font: 'Courier New', monospace;
  --tab-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); font-family:var(--font); overflow:hidden; width:100vw; height:100vh; color:var(--text); touch-action:none; }

#map { position:absolute; inset:0; width:100%; height:100%; transition:filter 0.5s; }
#map.underwater { filter:hue-rotate(200deg) saturate(1.8) brightness(0.55); }
#map.night { filter:brightness(0.4) saturate(0.3) hue-rotate(20deg); }

#scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px); pointer-events:none; z-index:10; }

#underwater-overlay { position:fixed; inset:0; background:radial-gradient(ellipse at center,rgba(0,80,200,0.45) 0%,rgba(0,10,60,0.75) 100%); pointer-events:none; z-index:11; opacity:0; transition:opacity 0.5s; }
#underwater-overlay.active { opacity:1; }

#night-overlay { position:fixed; inset:0; background:rgba(0,0,30,0.5); pointer-events:none; z-index:11; opacity:0; transition:opacity 0.5s; }
#night-overlay.active { opacity:1; }

/* 十字線 */
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:60px; height:60px; pointer-events:none; z-index:20; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:var(--accent); opacity:0.6; }
#crosshair::before { top:50%;left:0;width:100%;height:1px;transform:translateY(-50%); }
#crosshair::after { left:50%;top:0;height:100%;width:1px;transform:translateX(-50%); }
.ch-c { position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:0.9; }
.tl{top:0;left:0;border-width:2px 0 0 2px} .tr{top:0;right:0;border-width:2px 2px 0 0}
.bl{bottom:0;left:0;border-width:0 0 2px 2px} .br{bottom:0;right:0;border-width:0 2px 2px 0}

/* 上部HUD */
#hud-top { position:fixed; top:0;left:0;right:0; padding:10px 14px 6px; display:flex; justify-content:space-between; align-items:flex-start; z-index:30; background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent); pointer-events:none; }
.hud-b { display:flex;flex-direction:column;gap:2px; }
.hud-l { font-size:9px;color:var(--dim);letter-spacing:2px; }
.hud-v { font-size:17px;color:var(--accent);font-weight:bold;text-shadow:0 0 10px var(--accent); }
.hud-v.warn{color:var(--warn);text-shadow:0 0 10px var(--warn);}
.hud-v.danger{color:var(--danger);text-shadow:0 0 10px var(--danger);}
.hud-v.blue{color:var(--accent2);text-shadow:0 0 10px var(--accent2);}

/* コンパス */
#compass { position:fixed; top:58px; left:50%; transform:translateX(-50%); font-size:9px; color:var(--dim); letter-spacing:1px; z-index:30; pointer-events:none; white-space:nowrap; text-align:center; }
#compass-dir { font-size:13px; color:var(--accent); display:block; }

/* 速度メーター */
#speed-bar { position:fixed; left:8px; top:50%; transform:translateY(-50%); width:3px; height:120px; background:var(--border); border-radius:2px; z-index:30; pointer-events:none; }
#speed-fill { position:absolute; bottom:0;left:0;right:0; background:linear-gradient(to top,var(--accent),rgba(0,255,180,0.2)); border-radius:2px; transition:height 0.2s; }

/* タブバー */
#tabbar { position:fixed; bottom:0;left:0;right:0; height:var(--tab-h); background:rgba(4,12,10,0.97); border-top:1px solid var(--border); display:flex; z-index:100; }
.tab-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; border:none; background:none; color:var(--dim); font-family:var(--font); font-size:9px; letter-spacing:1px; transition:all 0.2s; padding-bottom:4px; }
.tab-btn.active { color:var(--accent); }
.tab-icon { font-size:20px; }

/* パネル共通 */
.panel { position:fixed; bottom:var(--tab-h); left:0;right:0; background:var(--panel); border-top:1px solid var(--border); z-index:50; display:none; overflow-y:auto; max-height:72vh; }
.panel.active { display:block; }
.panel-title { font-size:11px; color:var(--accent); letter-spacing:3px; padding:12px 16px 8px; border-bottom:1px solid var(--border); }

/* 飛行コントロール */
#fly-controls { position:fixed; bottom:var(--tab-h); left:0;right:0; padding:8px 14px 10px; background:linear-gradient(to top,rgba(0,0,0,0.9),transparent); z-index:40; }
#status-row { display:flex; justify-content:space-between; margin-bottom:8px; padding:4px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.s-item { display:flex;flex-direction:column;align-items:center;gap:2px; }
.s-dot { width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite; }
.s-dot.warn{background:var(--warn);box-shadow:0 0 6px var(--warn);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.s-lbl { font-size:8px;color:var(--dim);letter-spacing:1px; }
#ctrl-row { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; }

/* ジョイスティック */
.joy-wrap { display:flex;flex-direction:column;align-items:center;gap:4px; }
.joy-lbl { font-size:8px;color:var(--dim);letter-spacing:2px; }
.joy-base { width:92px;height:92px;border-radius:50%; border:1.5px solid var(--border); background:rgba(0,20,15,0.85); position:relative;touch-action:none; }
.joy-ring{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(0,255,180,0.1);}
.joy-knob { position:absolute;width:30px;height:30px;border-radius:50%; background:radial-gradient(circle at 35% 35%,rgba(0,255,180,0.95),rgba(0,200,140,0.5)); border:1.5px solid var(--accent); top:50%;left:50%;transform:translate(-50%,-50%); box-shadow:0 0 14px rgba(0,255,180,0.6); pointer-events:none; }

/* 高度 */
.alt-col { display:flex;flex-direction:column;align-items:center;gap:4px; }
.alt-btn { width:52px;height:52px;border-radius:50%; border:1.5px solid var(--border); background:rgba(0,20,15,0.85); color:var(--accent);font-size:22px; display:flex;align-items:center;justify-content:center; cursor:pointer;touch-action:manipulation;transition:all 0.1s; }
.alt-btn:active{background:rgba(0,255,180,0.15);box-shadow:0 0 15px rgba(0,255,180,0.4);transform:scale(0.95);}
.alt-info{display:flex;flex-direction:column;align-items:center;gap:1px;}
.alt-num{font-size:15px;color:var(--accent);text-shadow:0 0 8px var(--accent);font-weight:bold;}
.alt-unit{font-size:8px;color:var(--dim);}

/* 自動飛行 */
#auto-btn { position:fixed;top:74px;right:14px;z-index:35; background:var(--panel);border:1px solid var(--border); color:var(--accent);font-family:var(--font); font-size:9px;letter-spacing:2px; padding:6px 10px;cursor:pointer; }
#auto-btn.active{background:rgba(0,255,180,0.2);border-color:var(--accent);box-shadow:0 0 10px rgba(0,255,180,0.3);}

/* 出発地 */
#panel-depart { padding:0 0 16px; }
.section-lbl { font-size:9px;color:var(--dim);letter-spacing:2px; padding:10px 16px 6px; }
.city-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 12px; }
.city-btn { background:rgba(0,20,15,0.8); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:11px; padding:10px 4px; cursor:pointer; text-align:center; transition:all 0.2s; line-height:1.4; }
.city-btn:active,.city-btn.selected { background:rgba(0,255,180,0.15); border-color:var(--accent); color:var(--accent); }
.city-flag{font-size:18px;display:block;} .city-name{font-size:10px;display:block;margin-top:2px;}
.input-row { display:flex; gap:8px; padding:8px 12px 0; }
.addr-input { flex:1; background:rgba(0,20,15,0.9); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:12px; padding:10px 12px; outline:none; }
.addr-input:focus{border-color:var(--accent);}
.addr-input::placeholder{color:var(--dim);font-size:11px;}
.search-btn { background:rgba(0,255,180,0.15); border:1px solid var(--accent); color:var(--accent); font-family:var(--font); font-size:11px; padding:10px 14px; cursor:pointer; white-space:nowrap; }
.coord-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:8px 12px 0; }
.fly-start-btn { margin:12px 12px 0; width:calc(100% - 24px); background:linear-gradient(135deg,rgba(0,255,180,0.2),rgba(0,200,140,0.1)); border:1px solid var(--accent); color:var(--accent); font-family:var(--font); font-size:13px; letter-spacing:3px; padding:14px; cursor:pointer; text-align:center; box-shadow:0 0 15px rgba(0,255,180,0.2); }
.fly-start-btn:active{opacity:0.7;}

/* カメラ */
#panel-camera{padding:12px;}
.cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cam-btn{background:rgba(0,20,15,0.8);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:14px 8px;cursor:pointer;text-align:center;transition:all 0.2s;}
.cam-btn.active{background:rgba(0,255,180,0.15);border-color:var(--accent);color:var(--accent);}
.cam-icon{font-size:22px;display:block;margin-bottom:5px;}

/* 記録 */
#panel-log{padding:0 0 16px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(0,255,180,0.07);}
.log-place{font-size:12px;color:var(--text);}
.log-time{font-size:9px;color:var(--dim);}
.log-fly-btn{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--font);font-size:9px;padding:5px 10px;cursor:pointer;}
.log-empty{text-align:center;color:var(--dim);font-size:11px;padding:30px;}

/* ローディング */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
#loading h2{color:var(--accent);letter-spacing:6px;font-size:16px;text-shadow:0 0 20px var(--accent);}
.load-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-fill{height:100%;background:var(--accent);animation:ldanim 2s ease forwards;box-shadow:0 0 8px var(--accent);}
@keyframes ldanim{from{width:0}to{width:100%}}
#loading p{font-size:10px;color:var(--dim);letter-spacing:3px;animation:blink 1s infinite;}
</style>
</head>
<body>

<div id="loading">
  <h2>◈ ドローン飛行</h2>
  <div class="load-bar"><div class="load-fill"></div></div>
  <p>ナビゲーション起動中...</p>
</div>

<div id="map"></div>
<div id="scanlines"></div>
<div id="underwater-overlay"></div>
<div id="night-overlay"></div>

<div id="crosshair">
  <div class="ch-c tl"></div><div class="ch-c tr"></div>
  <div class="ch-c bl"></div><div class="ch-c br"></div>
</div>

<div id="speed-bar"><div id="speed-fill" style="height:0%"></div></div>

<div id="hud-top">
  <div class="hud-b">
    <span class="hud-l">高度</span>
    <span class="hud-v" id="alt-display">150m</span>
  </div>
  <div class="hud-b" style="align-items:center">
    <span class="hud-l">◈ ドローン飛行</span>
    <span class="hud-v" style="font-size:11px" id="mode-display">手動</span>
  </div>
  <div class="hud-b" style="align-items:flex-end">
    <span class="hud-l">速度</span>
    <span class="hud-v" id="spd-display">0 km/h</span>
    <span style="font-size:8px;color:var(--dim)" id="ver-display">v2.0.0</span>
  </div>
</div>

<div id="compass">
  <span id="compass-dir">北</span>
  <span id="coords-display">35.6762°N 139.6503°E</span>
</div>

<button id="auto-btn" onclick="toggleAuto()">自動飛行</button>

<div id="fly-controls">
  <div id="status-row">
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">GPS</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">通信</span></div>
    <div class="s-item"><div class="s-dot" id="bat-dot"></div><span class="s-lbl" id="bat-lbl">電池100%</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl" id="city-lbl">東京</span></div>
  </div>
  <div id="ctrl-row">
    <div class="joy-wrap">
      <span class="joy-lbl">移動</span>
      <div class="joy-base" id="joy-move"><div class="joy-ring"></div><div class="joy-knob" id="knob-move"></div></div>
    </div>
    <div class="alt-col">
      <button class="alt-btn" id="btn-up">▲</button>
      <div class="alt-info">
        <span class="alt-num" id="alt-num">150</span>
        <span class="alt-unit">メートル</span>
      </div>
      <button class="alt-btn" id="btn-down">▼</button>
    </div>
    <div class="joy-wrap">
      <span class="joy-lbl">旋回</span>
      <div class="joy-base" id="joy-rotate"><div class="joy-ring"></div><div class="joy-knob" id="knob-rotate"></div></div>
    </div>
  </div>
</div>

<!-- 出発地パネル -->
<div class="panel" id="panel-depart">
  <div class="panel-title">◈ 出発地を選ぶ</div>
  <div class="section-lbl">▸ 人気の都市</div>
  <div class="city-grid">
    <button class="city-btn" onclick="flyTo(35.6895,139.6917,'東京')"><span class="city-flag">🗼</span><span class="city-name">東京</span></button>
    <button class="city-btn" onclick="flyTo(34.6937,135.5023,'大阪')"><span class="city-flag">🏯</span><span class="city-name">大阪</span></button>
    <button class="city-btn" onclick="flyTo(35.0116,135.7681,'京都')"><span class="city-flag">⛩️</span><span class="city-name">京都</span></button>
    <button class="city-btn" onclick="flyTo(26.2124,127.6809,'沖縄')"><span class="city-flag">🌊</span><span class="city-name">沖縄</span></button>
    <button class="city-btn" onclick="flyTo(43.0642,141.3469,'札幌')"><span class="city-flag">❄️</span><span class="city-name">札幌</span></button>
    <button class="city-btn" onclick="flyTo(33.5904,130.4017,'福岡')"><span class="city-flag">🎋</span><span class="city-name">福岡</span></button>
    <button class="city-btn" onclick="flyTo(35.3606,138.7274,'富士山')"><span class="city-flag">🗻</span><span class="city-name">富士山</span></button>
    <button class="city-btn" onclick="flyTo(40.7128,-74.0060,'ニューヨーク')"><span class="city-flag">🗽</span><span class="city-name">NY</span></button>
    <button class="city-btn" onclick="flyTo(48.8566,2.3522,'パリ')"><span class="city-flag">🇫🇷</span><span class="city-name">パリ</span></button>
    <button class="city-btn" onclick="flyTo(25.2048,55.2708,'ドバイ')"><span class="city-flag">🌆</span><span class="city-name">ドバイ</span></button>
    <button class="city-btn" onclick="flyTo(51.5074,-0.1278,'ロンドン')"><span class="city-flag">🎡</span><span class="city-name">ロンドン</span></button>
    <button class="city-btn" onclick="flyTo(-33.8688,151.2093,'シドニー')"><span class="city-flag">🦘</span><span class="city-name">シドニー</span></button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 住所・場所で検索</div>
  <div class="input-row">
    <input class="addr-input" id="addr-input" type="text" placeholder="例：富士山、東京スカイツリー..."/>
    <button class="search-btn" onclick="searchAddress()">検索</button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 座標で指定</div>
  <div class="coord-row">
    <input class="addr-input" id="lat-input" type="number" placeholder="緯度 35.6762" step="0.0001"/>
    <input class="addr-input" id="lng-input" type="number" placeholder="経度 139.6503" step="0.0001"/>
  </div>
  <div class="input-row" style="margin-top:0">
    <button class="search-btn" style="flex:1" onclick="flyToCoords()">この座標へ移動</button>
  </div>
  <button class="fly-start-btn" onclick="startFlight()">◈ 飛行開始</button>
</div>

<!-- カメラパネル -->
<div class="panel" id="panel-camera">
  <div class="panel-title">◈ カメラ視点</div>
  <div class="cam-grid">
    <button class="cam-btn" id="cam-street" onclick="setCam('street')"><span class="cam-icon">🏙️</span>街中（低空）</button>
    <button class="cam-btn active" id="cam-tilt" onclick="setCam('tilt')"><span class="cam-icon">📐</span>斜め俯瞰</button>
    <button class="cam-btn" id="cam-top" onclick="setCam('top')"><span class="cam-icon">🛰️</span>真上から</button>
    <button class="cam-btn" id="cam-high" onclick="setCam('high')"><span class="cam-icon">☁️</span>高高度</button>
  </div>
  <div class="section-lbl" style="margin-top:10px">▸ 特殊モード</div>
  <div class="cam-grid">
    <button class="cam-btn" id="cam-under" onclick="setCam('underwater')"><span class="cam-icon">🌊</span>海中潜水</button>
    <button class="cam-btn" id="cam-night" onclick="setCam('night')"><span class="cam-icon">🌃</span>夜間モード</button>
  </div>
</div>

<!-- 記録パネル -->
<div class="panel" id="panel-log">
  <div class="panel-title">◈ 飛行記録</div>
  <div id="log-list"><div class="log-empty">まだ記録がありません</div></div>
</div>

<!-- タブバー -->
<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('fly')"><span class="tab-icon">🚁</span>飛行</button>
  <button class="tab-btn" onclick="switchTab('depart')"><span class="tab-icon">📍</span>出発地</button>
  <button class="tab-btn" onclick="switchTab('camera')"><span class="tab-icon">📷</span>カメラ</button>
  <button class="tab-btn" onclick="switchTab('log')"><span class="tab-icon">📋</span>記録</button>
</div>

<script>
// ===== 状態管理 =====
const S = {
  lat:35.6895, lng:139.6917,
  alt:80, speed:0, heading:0,
  autoFly:false, autoAngle:0, autoBaseLat:35.6895, autoBaseLng:139.6917,
  battery:100,
  map:null,
  joyActive:false, joyDx:0, joyDy:0,
  rotActive:false, rotDx:0,
  altDir:0,
  camMode:'tilt',
  log:[],
  currentCity:'東京',
};

const MAX_ALT=800, MIN_ALT=5;
const SPD=0.00030; // 3倍速
const DIRS=['北','北東','東','南東','南','南西','西','北西'];

// ===== マップ初期化 =====
function initMap() {
  S.map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:S.lat, lng:S.lng},
    zoom:18,
    mapTypeId:'satellite',
    tilt:60,   // デフォルト斜め
    heading:0,
    disableDefaultUI:true,
    gestureHandling:'none',
    keyboardShortcuts:false,
  });
  S.map.addListener('tilesloaded', () => {
    setTimeout(()=>{ document.getElementById('loading').style.display='none'; },600);
  });
  document.getElementById('ver-display').textContent = 'v'+APP_VERSION;
  startLoop();
  setupJoy('joy-move','knob-move',false);
  setupJoy('joy-rotate','knob-rotate',true);
  setupAltBtns();
  startBattery();
}

// ===== メインループ =====
function startLoop() {
  setInterval(()=>{
    if (S.autoFly) autoStep();
    else {
      if (S.joyActive) manualStep();
      else S.speed = Math.max(0, S.speed-2);
      if (S.rotActive) S.heading = (S.heading + S.rotDx*3) % 360;
    }
    if (S.altDir!==0) S.alt = Math.max(MIN_ALT, Math.min(MAX_ALT, S.alt+S.altDir*5));
    updateMap();
    updateHUD();
  },50);
}

function manualStep() {
  const rad = S.heading * Math.PI/180;
  const fwd=-S.joyDy, str=S.joyDx;
  S.lat += (Math.cos(rad)*fwd - Math.sin(rad)*str) * SPD;
  S.lng += (Math.sin(rad)*fwd + Math.cos(rad)*str) * SPD;
  S.speed = Math.round(Math.sqrt(S.joyDx**2+S.joyDy**2)*80);
}

function autoStep() {
  S.autoAngle += 0.01;
  const r=0.003;
  S.lat = S.autoBaseLat + Math.cos(S.autoAngle)*r;
  S.lng = S.autoBaseLng + Math.sin(S.autoAngle)*r;
  S.heading = (S.autoAngle*180/Math.PI+90)%360;
  S.speed = 45;
  S.alt = 120 + Math.sin(S.autoAngle*3)*40;
}

function updateMap() {
  if (!S.map) return;
  const camSettings = {
    street:  {tilt:67, zoom:()=>19},
    tilt:    {tilt:60, zoom:()=>Math.max(15,Math.min(19,19-S.alt/80))},
    top:     {tilt:0,  zoom:()=>Math.max(14,Math.min(19,19-S.alt/80))},
    high:    {tilt:30, zoom:()=>Math.max(12,14-S.alt/200)},
    underwater:{tilt:45,zoom:()=>17},
    night:   {tilt:55, zoom:()=>Math.max(15,Math.min(19,19-S.alt/80))},
  };
  const cs = camSettings[S.camMode] || camSettings.tilt;
  S.map.moveCamera({
    center:{lat:S.lat, lng:S.lng},
    heading:S.heading,
    tilt:cs.tilt,
    zoom:cs.zoom(),
  });
  const isUnder = S.camMode==='underwater';
  const isNight = S.camMode==='night';
  document.getElementById('map').classList.toggle('underwater', isUnder);
  document.getElementById('map').classList.toggle('night', isNight);
  document.getElementById('underwater-overlay').classList.toggle('active', isUnder);
  document.getElementById('night-overlay').classList.toggle('active', isNight);
}

function altToZoom(alt) {
  return Math.max(13, Math.min(20, 20-alt/60));
}

// ===== HUD更新 =====
function updateHUD() {
  const isUnder = S.camMode==='underwater';
  const isNight = S.camMode==='night';
  const altLabel = isUnder ? `海中 ${Math.round(S.alt)}m` : `${Math.round(S.alt)}m`;
  document.getElementById('alt-display').textContent = altLabel;
  document.getElementById('alt-display').className = 'hud-v'+(isUnder?' blue':S.alt<20?' danger':'');
  document.getElementById('spd-display').textContent = Math.round(S.speed)+' km/h';
  document.getElementById('spd-display').className = 'hud-v'+(S.speed>70?' warn':'');
  document.getElementById('alt-num').textContent = Math.round(S.alt);
  document.getElementById('coords-display').textContent = S.lat.toFixed(4)+'°N '+S.lng.toFixed(4)+'°E';
  document.getElementById('mode-display').textContent = S.autoFly?'自動飛行':isUnder?'海中モード':isNight?'夜間モード':'手動';
  document.getElementById('city-lbl').textContent = S.currentCity;
  // コンパス
  const dirIdx = Math.round(((S.heading%360)+360)%360/45)%8;
  document.getElementById('compass-dir').textContent = DIRS[dirIdx];
  // 速度バー
  document.getElementById('speed-fill').style.height = Math.min(100,S.speed/100*100)+'%';
}

// ===== ジョイスティック =====
function setupJoy(baseId, knobId, isRotate) {
  const base=document.getElementById(baseId);
  const knob=document.getElementById(knobId);
  const R=30;
  let sx,sy;
  function gp(e){const t=e.touches?.[0]||e;return{x:t.clientX,y:t.clientY};}
  base.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=base.getBoundingClientRect();
    sx=r.left+r.width/2; sy=r.top+r.height/2;
    if(isRotate)S.rotActive=true; else S.joyActive=true;
    move(e);
  },{passive:false});
  function move(e){
    if(isRotate?!S.rotActive:!S.joyActive)return;
    e.preventDefault();
    const p=gp(e);
    let dx=p.x-sx, dy=p.y-sy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>R){dx=dx/d*R;dy=dy/d*R;}
    if(isRotate){S.rotDx=dx/R;}
    else{S.joyDx=dx/R;S.joyDy=dy/R;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  }
  function end(){
    if(isRotate){S.rotActive=false;S.rotDx=0;}
    else{S.joyActive=false;S.joyDx=0;S.joyDy=0;}
    knob.style.transform='translate(-50%,-50%)';
  }
  base.addEventListener('touchmove',move,{passive:false});
  base.addEventListener('touchend',end);
  base.addEventListener('mousedown',e=>{sx=e.clientX;sy=e.clientY;if(isRotate)S.rotActive=true;else S.joyActive=true;});
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
}

// ===== 高度ボタン =====
function setupAltBtns(){
  const up=document.getElementById('btn-up');
  const dn=document.getElementById('btn-down');
  up.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=1;},{passive:false});
  dn.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=-1;},{passive:false});
  [up,dn].forEach(b=>b.addEventListener('touchend',()=>S.altDir=0));
  up.addEventListener('mousedown',()=>S.altDir=1);
  dn.addEventListener('mousedown',()=>S.altDir=-1);
  window.addEventListener('mouseup',()=>S.altDir=0);
}

// ===== 自動飛行 =====
function toggleAuto(){
  S.autoFly=!S.autoFly;
  S.autoBaseLat=S.lat; S.autoBaseLng=S.lng;
  const btn=document.getElementById('auto-btn');
  btn.textContent=S.autoFly?'■ 停止':'自動飛行';
  btn.classList.toggle('active',S.autoFly);
}

// ===== タブ切替 =====
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['fly','depart','camera','log'][i]===tab);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const showCtrl = tab==='fly';
  document.getElementById('fly-controls').style.display=showCtrl?'block':'none';
  document.getElementById('auto-btn').style.display=showCtrl?'block':'none';
  if(tab==='depart') document.getElementById('panel-depart').classList.add('active');
  if(tab==='camera') document.getElementById('panel-camera').classList.add('active');
  if(tab==='log') document.getElementById('panel-log').classList.add('active');
}

// ===== 都市へ移動 =====
function flyTo(lat,lng,name){
  S.lat=lat; S.lng=lng; S.currentCity=name;
  S.alt=80; S.speed=0;
  S.autoBaseLat=lat; S.autoBaseLng=lng;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('selected'));
  event.target.closest('.city-btn').classList.add('selected');
}

// ===== 住所検索 =====
function searchAddress(){
  const q=document.getElementById('addr-input').value.trim();
  if(!q)return;
  const gc=new google.maps.Geocoder();
  gc.geocode({address:q,language:'ja'},(results,status)=>{
    if(status==='OK'&&results[0]){
      const loc=results[0].geometry.location;
      S.lat=loc.lat(); S.lng=loc.lng();
      S.currentCity=q; S.alt=120;
      S.autoBaseLat=S.lat; S.autoBaseLng=S.lng;
      alert('「'+q+'」が見つかりました！飛行開始を押してください。');
    } else {
      alert('場所が見つかりませんでした。');
    }
  });
}

// ===== 座標飛行 =====
function flyToCoords(){
  const lat=parseFloat(document.getElementById('lat-input').value);
  const lng=parseFloat(document.getElementById('lng-input').value);
  if(isNaN(lat)||isNaN(lng)){alert('緯度・経度を正しく入力してください');return;}
  S.lat=lat; S.lng=lng;
  S.currentCity=`${lat.toFixed(3)},${lng.toFixed(3)}`;
  S.alt=120; S.autoBaseLat=lat; S.autoBaseLng=lng;
}

// ===== 飛行開始 =====
function startFlight(){
  S.log.unshift({place:S.currentCity,lat:S.lat,lng:S.lng,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});
  renderLog();
  switchTab('fly');
}

// ===== 記録 =====
function renderLog(){
  const el=document.getElementById('log-list');
  if(!S.log.length){el.innerHTML='<div class="log-empty">まだ記録がありません</div>';return;}
  el.innerHTML=S.log.slice(0,20).map(e=>`
    <div class="log-item">
      <div><div class="log-place">📍 ${e.place}</div><div class="log-time">${e.time}</div></div>
      <button class="log-fly-btn" onclick="refly(${e.lat},${e.lng},'${e.place}')">再訪</button>
    </div>`).join('');
}
function refly(lat,lng,name){S.lat=lat;S.lng=lng;S.currentCity=name;S.alt=80;switchTab('fly');}

// ===== カメラ切替 =====
function setCam(mode){
  S.camMode=mode;
  document.querySelectorAll('.cam-btn').forEach(b=>b.classList.remove('active'));
  const idMap={street:'cam-street',tilt:'cam-tilt',top:'cam-top',high:'cam-high',underwater:'cam-under',night:'cam-night'};
  const el=document.getElementById(idMap[mode]);
  if(el)el.classList.add('active');
  if(mode==='street')S.alt=30;
  if(mode==='high')S.alt=400;
}

// ===== バッテリー =====
function startBattery(){
  setInterval(()=>{
    S.battery=Math.max(0,S.battery-0.04);
    const pct=Math.round(S.battery);
    document.getElementById('bat-lbl').textContent='電池'+pct+'%';
    if(pct<20)document.getElementById('bat-dot').className='s-dot warn';
  },3000);
}
