<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ドローン飛行</title>
<script>const APP_VERSION='N3.1.0';</script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
:root{
  --accent:#2effc6; --accent2:#38bdf8; --dim:rgba(160,200,190,0.55);
  --panel:rgba(8,16,22,0.78); --border:rgba(120,220,200,0.22); --text:#e8f5f0;
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Roboto Mono',ui-monospace,monospace;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px); --sar:env(safe-area-inset-right,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e14;font-family:var(--font);color:var(--text);touch-action:none;-webkit-font-smoothing:antialiased;}
#cesiumContainer{position:absolute;inset:0;}
.cesium-viewer-bottom,.cesium-viewer-animationContainer,.cesium-viewer-timelineContainer,
.cesium-viewer-toolbar,.cesium-viewer-fullscreenContainer,.cesium-viewer-geocoderContainer,
.cesium-credit-lightbox,.cesium-credit-textContainer{display:none!important;}

/* ===== 選択画面 ===== */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;}
#boot.hide{display:none;}
#boot h2{color:var(--accent);letter-spacing:6px;font-size:16px;text-shadow:0 0 20px var(--accent);font-weight:700;}
#boot-ver{font-size:11px;color:var(--accent2);letter-spacing:3px;}
.boot-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.boot-fill{height:100%;background:var(--accent);width:0;transition:width 0.4s ease;}
#boot-status{font-size:11px;color:var(--accent2);letter-spacing:2px;min-height:18px;}
#boot p{font-size:10px;color:var(--dim);letter-spacing:3px;}
#picker{position:fixed;inset:0;z-index:1500;background:linear-gradient(160deg,#0a0e14,#0d1620);
  display:flex;flex-direction:column;padding:calc(20px + var(--sat)) 20px calc(20px + var(--sab));overflow:hidden;}
#picker h1{font-size:24px;font-weight:800;letter-spacing:2px;color:var(--accent);margin-bottom:2px;}
#picker .sub{font-size:12px;color:var(--dim);margin-bottom:18px;}
.pick-sec{font-size:11px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin:14px 2px 8px;}
#pref-view,#city-view{display:flex;flex-direction:column;height:100%;min-height:0;}
.pick-head{font-size:13px;color:var(--text);letter-spacing:1px;margin:0 2px 12px;display:flex;align-items:center;gap:10px;flex:0 0 auto;}
#back-pref{background:rgba(8,16,22,0.7);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-size:13px;font-weight:600;padding:8px 14px;min-height:40px;}
#city-head-name{color:var(--accent);font-weight:700;font-size:15px;}
#pref-list,#city-list{display:flex;flex-wrap:wrap;gap:8px;overflow-y:auto;align-content:flex-start;flex:1 1 auto;min-height:0;padding-bottom:20px;-webkit-overflow-scrolling:touch;}
.chip{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;
  font-size:14px;font-weight:600;color:var(--text);min-height:44px;display:flex;align-items:center;}
.chip.active{background:var(--accent);color:#04140e;border-color:var(--accent);}
#city-wrap{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:6px;}
#city-list{flex:1;}
#picker .hint{font-size:11px;color:var(--dim);text-align:center;margin-top:10px;}
#pick-status{font-size:12px;color:var(--accent);text-align:center;padding:8px;min-height:20px;flex:0 0 auto;}

/* ===== ローディング ===== */
#loading{position:fixed;inset:0;z-index:1400;background:#0a0e14;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;}
#loading.show{display:flex;}
#loading .ttl{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;}
#loading .sub{font-size:13px;color:var(--dim);white-space:pre-wrap;text-align:center;line-height:1.7;padding:0 30px;}
.spin{width:38px;height:38px;border:3px solid rgba(46,255,198,0.2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.9s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ===== HUD ===== */
#hud-top{position:fixed;top:0;left:0;right:0;padding:calc(8px + var(--sat)) calc(16px + var(--sar)) 10px calc(16px + var(--sal));
  display:flex;justify-content:space-between;align-items:flex-start;z-index:30;
  background:linear-gradient(to bottom,rgba(4,10,14,0.9),rgba(4,10,14,0.35) 60%,transparent);pointer-events:none;}
.hud-b{display:flex;flex-direction:column;gap:1px;}
.hud-b.right{align-items:flex-end;}
.hud-l{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
.hud-v{font-size:26px;color:#fff;font-weight:700;line-height:1.05;font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}
.hud-v .u{font-size:13px;color:var(--accent);font-weight:600;margin-left:3px;}
#compass{position:fixed;top:calc(56px + var(--sat));left:50%;transform:translateX(-50%);z-index:30;pointer-events:none;text-align:center;}
#compass-dir{font-size:18px;color:#fff;font-weight:600;letter-spacing:1px;}
#place-name{position:fixed;top:calc(80px + var(--sat));left:50%;transform:translateX(-50%);z-index:30;pointer-events:none;font-size:12px;color:var(--accent);letter-spacing:1px;}

/* ===== 操作 ===== */
#controls{position:fixed;left:0;right:0;bottom:0;z-index:40;padding-bottom:calc(10px + var(--sab));}
#speed-row{display:flex;justify-content:center;gap:10px;margin-bottom:14px;}
#speed-mode{display:flex;gap:0;background:rgba(8,16,22,0.6);border:1px solid var(--border);border-radius:9px;padding:2px;backdrop-filter:blur(8px);}
.spd-btn{background:transparent;border:none;color:var(--dim);font-family:var(--font);font-size:11px;font-weight:600;padding:7px 11px;border-radius:7px;}
.spd-btn.active{background:var(--accent);color:#04140e;}
#home-btn{background:rgba(8,16,22,0.6);border:1px solid var(--border);border-radius:9px;color:var(--accent2);font-size:11px;font-weight:600;padding:7px 13px;backdrop-filter:blur(8px);}
.joys{display:flex;justify-content:space-between;align-items:center;padding:0 calc(20px + var(--sal)) 0 calc(20px + var(--sar));}
.joy-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.joy-lbl{font-size:10px;color:var(--dim);letter-spacing:1px;}
.joy{width:118px;height:118px;border-radius:50%;background:radial-gradient(circle,rgba(46,255,198,0.06),rgba(8,16,22,0.5));border:1.5px solid var(--border);position:relative;touch-action:none;}
.joy.blue{background:radial-gradient(circle,rgba(56,189,248,0.06),rgba(8,16,22,0.5));}
.knob{width:46px;height:46px;border-radius:50%;background:var(--accent);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(46,255,198,0.5);}
.knob.blue{background:var(--accent2);box-shadow:0 0 16px rgba(56,189,248,0.5);}
.alt-col{display:flex;flex-direction:column;align-items:center;gap:8px;}
.alt-btn{width:56px;height:46px;border-radius:12px;background:rgba(8,16,22,0.6);border:1px solid var(--border);color:var(--accent);font-size:22px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.alt-val{font-size:18px;font-weight:700;color:#fff;font-family:var(--mono);}
.alt-unit{font-size:10px;color:var(--dim);}
</style>
</head>
<body>
<div id="cesiumContainer"></div>

<!-- 選択画面 -->
<div id="boot">
  <h2>&#9672; ドローン飛行</h2>
  <div id="boot-ver">--</div>
  <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>
  <div id="boot-status">起動中...</div>
  <p>実地形データを構築中</p>
</div>

<div id="picker" style="display:none">
  <div id="pref-view">
    <div class="pick-head">出発する都道府県</div>
    <div id="pref-list"></div>
    <div id="pick-status">整備都市を取得中...</div>
  </div>
  <div id="city-view" style="display:none">
    <div class="pick-head"><button id="back-pref" onclick="backToPref()">‹ 都道府県</button><span id="city-head-name"></span></div>
    <div id="city-list"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading">
  <div class="ttl">接続中...</div>
  <div class="spin"></div>
  <div class="sub" id="load-sub">本物の街を読み込んでいます</div>
</div>

<!-- HUD -->
<div id="hud-top">
  <div class="hud-b"><span class="hud-l">高度</span><span class="hud-v"><span id="alt-num">300</span><span class="u">m</span></span></div>
  <div class="hud-b" style="align-items:center"><span class="hud-l">ドローン</span></div>
  <div class="hud-b right"><span class="hud-l">速度</span><span class="hud-v"><span id="spd-num">0</span><span class="u">km/h</span></span></div>
</div>
<div id="compass"><span id="compass-dir">北</span></div>
<div id="place-name"></div>
<div id="env-bar" style="position:fixed;top:calc(100px + var(--sat));left:50%;transform:translateX(-50%);z-index:30;pointer-events:none;display:flex;gap:14px;font-family:var(--mono);font-size:12px;color:var(--text);background:rgba(8,16,22,0.5);padding:5px 12px;border-radius:8px;backdrop-filter:blur(6px);white-space:nowrap;"><span id="env-time">--:--</span><span id="env-temp" style="color:var(--accent)">--&#176;C</span><span id="env-coords" style="color:var(--dim)">--</span></div>

<!-- 操作 -->
<div id="controls" style="display:none">
  <div id="speed-row">
    <div id="speed-mode">
      <button class="spd-btn" id="spd-slow" onclick="setSpeed('slow')">低速</button>
      <button class="spd-btn active" id="spd-mid" onclick="setSpeed('mid')">中速</button>
      <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">高速</button>
    </div>
    <button id="snd-btn" onclick="toggleSound()" style="background:rgba(8,16,22,0.6);border:1px solid var(--border);border-radius:9px;color:var(--accent);font-size:11px;font-weight:600;padding:7px 13px;backdrop-filter:blur(8px);margin-right:8px;">&#128263; &#38899;OFF</button><button id="home-btn" onclick="backToPicker()">街を変える</button>
  </div>
  <div class="joys">
    <div class="joy-wrap"><span class="joy-lbl">移動</span><div class="joy" id="joy-move"><div class="knob" id="knob-move"></div></div></div>
    <div class="alt-col">
      <button class="alt-btn" id="alt-up" ontouchstart="altHold(1)" ontouchend="altRelease()" onmousedown="altHold(1)" onmouseup="altRelease()">▲</button>
      <span class="alt-val" id="alt-val2">300</span><span class="alt-unit">メートル</span>
      <button class="alt-btn" id="alt-down" ontouchstart="altHold(-1)" ontouchend="altRelease()" onmousedown="altHold(-1)" onmouseup="altRelease()">▼</button>
    </div>
    <div class="joy-wrap"><span class="joy-lbl">視点</span><div class="joy blue" id="joy-look"><div class="knob blue" id="knob-look"></div></div></div>
  </div>
</div>

<script>
// ============================================================
// ===== 状態 =====
// ============================================================
const S = { lat:35.68, lng:139.76, alt:300, heading:0, pitch:-25, speedMode:'mid', vx:0, vz:0, dHeading:0, dPitch:0, altDir:0, speed:0, flying:false, groundH:0, soundOn:false };
const SPEED = { slow:60, mid:160, fast:400 };
const DIRS = ['北','北東','東','南東','南','南西','西','北西'];
let viewer, currentTileset=null, cityList=[], selectedPref=null;

// ============================================================
// ===== Cesium初期化 =====
// ============================================================
function gsiDemTerrain(){
  const TILE=256, GSI_MAX=14;
  const cv=document.createElement('canvas'); cv.width=TILE; cv.height=TILE;
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  return new Cesium.CustomHeightmapTerrainProvider({
    width:64, height:64, tilingScheme:new Cesium.WebMercatorTilingScheme(),
    callback:function(x,y,level){
      const z=Math.min(level,GSI_MAX);
      const scale=Math.pow(2,level-z);
      const gx=Math.floor(x/scale), gy=Math.floor(y/scale);
      const url='https://cyberjapandata.gsi.go.jp/xyz/dem_png/'+z+'/'+gx+'/'+gy+'.png';
      const W=64,H=64;
      return new Promise(function(resolve){
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=function(){
          ctx.clearRect(0,0,TILE,TILE); ctx.drawImage(img,0,0,TILE,TILE);
          let d; try{ d=ctx.getImageData(0,0,TILE,TILE).data; }catch(e){ resolve(new Float32Array(W*H)); return; }
          const out=new Float32Array(W*H);
          const sub=TILE/scale, ox=(x-gx*scale)*sub, oy=(y-gy*scale)*sub;
          for(let j=0;j<H;j++) for(let i=0;i<W;i++){
            const px=Math.min(TILE-1,Math.floor(ox+(i/(W-1))*sub));
            const py=Math.min(TILE-1,Math.floor(oy+(j/(H-1))*sub));
            const k=(py*TILE+px)*4, r=d[k],g=d[k+1],b=d[k+2],a=d[k+3];
            let h=0;
            if(a!==0){ const v=r*65536+g*256+b; if(v<8388608)h=v*0.01; else if(v>8388608)h=(v-16777216)*0.01; }
            out[j*W+i]=h;
          }
          resolve(out);
        };
        img.onerror=function(){ resolve(new Float32Array(W*H)); };
        img.src=url;
      });
    }
  });
}
viewer = new Cesium.Viewer('cesiumContainer', {
  baseLayer: Cesium.ImageryLayer.fromProviderAsync(
    Cesium.ArcGisMapServerImageryProvider.fromUrl('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'), {}),
  terrainProvider: gsiDemTerrain(),
  baseLayerPicker:false, geocoder:false, homeButton:false, sceneModePicker:false,
  navigationHelpButton:false, animation:false, timeline:false, fullscreenButton:false,
  infoBox:false, selectionIndicator:false,
});
viewer.scene.globe.depthTestAgainstTerrain = true;
const ssc = viewer.scene.screenSpaceCameraController;
ssc.enableRotate=false; ssc.enableTranslate=false; ssc.enableZoom=false; ssc.enableTilt=false; ssc.enableLook=false;

// ===== 気温・天気・現地時刻（Open-Meteo・v19移植）=====
let envTemp=null, envUtcOffset=null, envWeatherCode=null;
function localNow(){ return envUtcOffset===null ? new Date() : new Date(Date.now()+envUtcOffset*1000); }
function localTimeStr(){
  const d = envUtcOffset===null ? new Date() : localNow();
  const h = envUtcOffset===null ? d.getHours() : d.getUTCHours();
  const m = envUtcOffset===null ? d.getMinutes() : d.getUTCMinutes();
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function weatherIcon(c){
  if(c===null) return '';
  if(c<=1) return '\u2600'; if(c<=3) return '\u26C5'; if(c<=48) return '\uD83C\uDF2B';
  if(c>=95) return '\u26A1'; if((c>=71&&c<=77)||c===85||c===86) return '\u2744';
  if(c>=51) return '\u2614'; return '';
}
async function fetchWeather(lat,lng){
  try{
    const ctrl=new AbortController(); const tm=setTimeout(()=>ctrl.abort(),8000);
    const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat.toFixed(3)+'&longitude='+lng.toFixed(3)+'&current=temperature_2m,weather_code&timezone=auto',{signal:ctrl.signal});
    clearTimeout(tm);
    const js=await res.json();
    if(js&&js.current&&typeof js.current.temperature_2m==='number'){
      envTemp=js.current.temperature_2m;
      if(typeof js.current.weather_code==='number') envWeatherCode=js.current.weather_code;
      if(typeof js.utc_offset_seconds==='number') envUtcOffset=js.utc_offset_seconds;
    }
  }catch(e){}
}
function updateEnvBar(){
  const et=document.getElementById('env-time'); if(!et) return;
  et.textContent=localTimeStr();
  document.getElementById('env-temp').textContent=(envTemp===null?'--':envTemp.toFixed(1))+'\u00B0C '+weatherIcon(envWeatherCode);
  document.getElementById('env-coords').textContent=Math.abs(S.lat).toFixed(3)+(S.lat>=0?'N':'S')+' '+Math.abs(S.lng).toFixed(3)+(S.lng>=0?'E':'W');
}
// ===== プロペラ音（Web Audio・v19移植）=====
const AU={ctx:null,gain:null,lp:null};
function initAudio(){
  if(AU.ctx) return true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return false;
    AU.ctx=new AC();
    const len=AU.ctx.sampleRate*2;
    const buf=AU.ctx.createBuffer(1,len,AU.ctx.sampleRate);
    const ch=buf.getChannelData(0); let last=0;
    for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.025*w)/1.025; ch[i]=last*4; }
    const src=AU.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    AU.lp=AU.ctx.createBiquadFilter(); AU.lp.type='lowpass'; AU.lp.frequency.value=280; AU.lp.Q.value=1.2;
    AU.gain=AU.ctx.createGain(); AU.gain.gain.value=0;
    src.connect(AU.lp); AU.lp.connect(AU.gain); AU.gain.connect(AU.ctx.destination);
    src.start(); return true;
  }catch(e){ return false; }
}
function toggleSound(){
  if(!S.soundOn){
    if(!initAudio()){ return; }
    if(AU.ctx.state==='suspended') AU.ctx.resume();
    S.soundOn=true;
    document.getElementById('snd-btn').innerHTML='\uD83D\uDD0A \u97F3ON';
  }else{
    S.soundOn=false;
    if(AU.gain) AU.gain.gain.value=0;
    document.getElementById('snd-btn').innerHTML='\uD83D\uDD07 \u97F3OFF';
  }
}

// ============================================================
// ===== 全国エンジン：整備都市リスト取得 =====
// ============================================================
let allCities = {};
// v19風起動画面の制御
document.getElementById('boot-ver').textContent = 'VER ' + APP_VERSION;
function bootProgress(pct, msg){
  const f=document.getElementById('boot-fill'); if(f) f.style.width=pct+'%';
  const s=document.getElementById('boot-status'); if(s&&msg) s.textContent=msg;
}
function bootDone(){
  document.getElementById('boot').classList.add('hide');
  document.getElementById('picker').style.display='flex';
}
(async function loadCatalog(){
  bootProgress(15, '起動中...');
  try {
    bootProgress(40, '整備都市を取得中...');
    const res = await fetch('https://api.plateauview.mlit.go.jp/datacatalog/plateau-datasets');
    const data = await res.json();
    bootProgress(70, '都市データを解析中...');
    const blds = data.datasets.filter(d => d.type_en==='bldg' && d.format==='3D Tiles' && d.url);
    const byCity = {};
    for (const d of blds){
      const key = d.pref + '|' + d.city;
      const lod = parseInt(d.lod) || 1;
      if (!byCity[key] || lod < byCity[key].lod){
        byCity[key] = { pref:d.pref, city:d.city, url:d.url, lod:lod };
      }
    }
    allCities = {};
    for (const k in byCity){
      const c = byCity[k];
      if (!allCities[c.pref]) allCities[c.pref] = [];
      allCities[c.pref].push(c);
    }
    buildPrefList();
    document.getElementById('pick-status').textContent =
      Object.keys(allCities).length + '都道府県・' + Object.keys(byCity).length + '都市。出発地を選んでください';
    bootProgress(100, '完了');
    setTimeout(bootDone, 500);
  } catch(e){
    bootProgress(100, '取得エラー');
    document.getElementById('pick-status').textContent = '取得エラー: ' + (e&&e.message?e.message:e);
    setTimeout(bootDone, 500);
  }
})();

function buildPrefList(){
  const wrap = document.getElementById('pref-list');
  wrap.innerHTML='';
  const prefs = Object.keys(allCities).sort((a,b)=> allCities[b].length - allCities[a].length);
  for (const p of prefs){
    const chip = document.createElement('div');
    chip.className='chip'; chip.textContent = p + '（' + allCities[p].length + '）';
    chip.onclick = ()=>selectPref(p, chip);
    wrap.appendChild(chip);
  }
}
function selectPref(pref, chip){
  selectedPref = pref;
  const wrap = document.getElementById('city-list');
  wrap.innerHTML='';
  const cities = allCities[pref].slice().sort((a,b)=>a.city.localeCompare(b.city,'ja'));
  for (const c of cities){
    const cc = document.createElement('div');
    cc.className='chip'; cc.textContent = c.city;
    cc.onclick = ()=>enterCity(c);
    wrap.appendChild(cc);
  }
  document.getElementById('city-head-name').textContent = pref;
  document.getElementById('pref-view').style.display='none';
  document.getElementById('city-view').style.display='flex';
  wrap.scrollTop = 0;
}
function backToPref(){
  document.getElementById('city-view').style.display='none';
  document.getElementById('pref-view').style.display='flex';
}

// ============================================================
// ===== 都市に入る =====
// ============================================================
function enterCity(c){
  document.getElementById('picker').style.display='none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('load-sub').textContent = c.pref + ' ' + c.city + ' の本物の街を読み込み中...\n（初回は数十秒かかることがあります）';
  document.getElementById('place-name').textContent = c.pref + ' ' + c.city;

  if (currentTileset){ viewer.scene.primitives.remove(currentTileset); currentTileset=null; }

  Cesium.Cesium3DTileset.fromUrl(c.url, { maximumScreenSpaceError:16 }).then((ts)=>{
    currentTileset = ts;
    viewer.scene.primitives.add(ts);
    const bs = ts.boundingSphere;
    const carto = Cesium.Cartographic.fromCartesian(bs.center);
    S.lat = Cesium.Math.toDegrees(carto.latitude);
    S.lng = Cesium.Math.toDegrees(carto.longitude);
    const go = ()=>{
      document.getElementById('loading').classList.remove('show');
      document.getElementById('controls').style.display='block';
      S.heading=0; S.pitch=-25; S.flying=true;
      fetchWeather(S.lat, S.lng);
      applyCamera();
      if(!S._loopStarted){ S._loopStarted=true; requestAnimationFrame(loop); }
    };
    Cesium.sampleTerrainMostDetailed(viewer.terrainProvider, [Cesium.Cartographic.fromDegrees(S.lng,S.lat)]).then((r)=>{
      S.groundH = (r&&r[0]&&isFinite(r[0].height))? r[0].height : 0;
      S.alt = S.groundH + 300; go();
    }).catch(()=>{ S.groundH=0; S.alt=300; go(); });
  }).catch((e)=>{
    document.getElementById('load-sub').textContent = '読込エラー: ' + (e&&e.message?e.message:e) + '\nこの都市のデータが取得できませんでした';
  });
}

function backToPicker(){
  S.flying=false;
  document.getElementById('controls').style.display='none';
  document.getElementById('place-name').textContent='';
  document.getElementById('city-view').style.display='none';
  document.getElementById('pref-view').style.display='flex';
  document.getElementById('picker').style.display='flex';
}

// ============================================================
// ===== カメラ反映 =====
// ============================================================
function applyCamera(){
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(S.lng, S.lat, S.alt),
    orientation: { heading:Cesium.Math.toRadians(S.heading), pitch:Cesium.Math.toRadians(S.pitch), roll:0 },
  });
}

// ============================================================
// ===== ループ =====
// ============================================================
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.05,(now-lastT)/1000); lastT=now;
  if (S.flying){
    if (S.altDir!==0) S.alt = Math.max(S.groundH+10, Math.min(S.groundH+5000, S.alt + S.altDir*80*dt));
    S.heading = (S.heading + S.dHeading*90*dt + 360)%360;
    S.pitch = Math.max(-85, Math.min(10, S.pitch - S.dPitch*60*dt));
    const mps = SPEED[S.speedMode]/3.6;
    const mag = Math.hypot(S.vx,S.vz);
    S.speed = mps*Math.min(1,mag);
    if (mag>0.01){
      const h = Cesium.Math.toRadians(S.heading);
      const fwd=-S.vz, side=S.vx;
      const north = Math.cos(h)*fwd - Math.sin(h)*side;
      const east  = Math.sin(h)*fwd + Math.cos(h)*side;
      const distM = mps*dt;
      S.lat += (north*distM)/111320;
      S.lng += (east*distM)/(111320*Math.cos(Cesium.Math.toRadians(S.lat)));
    }
    applyCamera();
    updateHUD();
    if(S.soundOn && AU.gain && AU.lp){
      const relA=Math.max(0,S.alt-S.groundH);
      AU.lp.frequency.value=240+S.speed*3.6*9+Math.min(200,relA*0.25);
      AU.gain.gain.value=Math.min(0.13,0.045+S.speed*3.6*0.0014);
    }
    if(!S._envT||now-S._envT>1000){ S._envT=now; updateEnvBar(); }
  }
  requestAnimationFrame(loop);
}
function updateHUD(){
  const a=Math.round(S.alt - S.groundH);
  document.getElementById('alt-num').textContent=a;
  document.getElementById('alt-val2').textContent=a;
  document.getElementById('spd-num').textContent=Math.round(S.speed*3.6);
  let h=((S.heading%360)+360)%360;
  document.getElementById('compass-dir').textContent=DIRS[Math.round(h/45)%8];
}

// ===== 速度・高度 =====
function setSpeed(m){ S.speedMode=m; ['slow','mid','fast'].forEach(x=>document.getElementById('spd-'+x).classList.toggle('active',x===m)); }
function altHold(d){ S.altDir=d; }
function altRelease(){ S.altDir=0; }

// ===== ジョイスティック =====
function setupJoy(padId,knobId,onMove){
  const pad=document.getElementById(padId),knob=document.getElementById(knobId);
  let active=false,id=null; const R=36;
  function pos(t){
    const r=pad.getBoundingClientRect();
    let dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
    const d=Math.hypot(dx,dy); if(d>R){dx=dx/d*R;dy=dy/d*R;}
    knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    onMove(dx/R,dy/R);
  }
  function reset(){ knob.style.transform='translate(-50%,-50%)'; onMove(0,0); }
  pad.addEventListener('touchstart',e=>{e.preventDefault();active=true;id=e.changedTouches[0].identifier;pos(e.changedTouches[0]);},{passive:false});
  pad.addEventListener('touchmove',e=>{if(!active)return;e.preventDefault();for(const t of e.changedTouches){if(t.identifier===id)pos(t);}},{passive:false});
  pad.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===id){active=false;reset();}}},{passive:false});
  pad.addEventListener('mousedown',e=>{active=true;pos(e);});
  window.addEventListener('mousemove',e=>{if(active)pos(e);});
  window.addEventListener('mouseup',()=>{if(active){active=false;reset();}});
}
setupJoy('joy-move','knob-move',(x,y)=>{S.vx=x;S.vz=y;});
setupJoy('joy-look','knob-look',(x,y)=>{S.dHeading=x;S.dPitch=y;});
</script>
