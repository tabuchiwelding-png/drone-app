<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドローン飛行</title>
<script>const APP_VERSION = '5.0.0';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --accent: #00ffb4;
  --dim: rgba(0,255,180,0.3);
  --danger: #ff3b3b;
  --warn: #ffaa00;
  --panel: rgba(4,14,10,0.97);
  --border: rgba(0,255,180,0.18);
  --text: #d0fff0;
  --font: 'Courier New', monospace;
  --tab-h: 56px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:var(--font); color:var(--text); touch-action:none; }
#canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
#scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px); pointer-events:none; z-index:10; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; pointer-events:none; z-index:20; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:var(--accent); opacity:0.5; }
#crosshair::before { top:50%;left:0;width:100%;height:1px;transform:translateY(-50%); }
#crosshair::after { left:50%;top:0;height:100%;width:1px;transform:translateX(-50%); }
.ch-c { position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:0.8; }
.tl{top:0;left:0;border-width:2px 0 0 2px}.tr{top:0;right:0;border-width:2px 2px 0 0}
.bl{bottom:0;left:0;border-width:0 0 2px 2px}.br{bottom:0;right:0;border-width:0 2px 2px 0}
#hud-top { position:fixed; top:0;left:0;right:0; padding:10px 14px 6px; display:flex; justify-content:space-between; z-index:30; background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent); pointer-events:none; }
.hud-b { display:flex;flex-direction:column;gap:2px; }
.hud-l { font-size:9px;color:var(--dim);letter-spacing:2px; }
.hud-v { font-size:17px;color:var(--accent);font-weight:bold;text-shadow:0 0 10px var(--accent); }
.hud-v.warn{color:var(--warn)}.hud-v.danger{color:var(--danger)}
#compass { position:fixed; top:60px; left:50%; transform:translateX(-50%); text-align:center; z-index:30; pointer-events:none; }
#compass-dir { font-size:14px;color:var(--accent);display:block;text-shadow:0 0 8px var(--accent); }
#coords-display { font-size:9px;color:var(--dim); }
#speed-mode { position:fixed; top:60px; left:14px; z-index:35; display:flex; flex-direction:column; gap:4px; }
.spd-btn { background:var(--panel); border:1px solid var(--border); color:var(--dim); font-family:var(--font); font-size:9px; padding:5px 8px; cursor:pointer; }
.spd-btn.active { background:rgba(0,255,180,0.15); border-color:var(--accent); color:var(--accent); }
#auto-btn { position:fixed; top:60px; right:14px; z-index:35; background:var(--panel); border:1px solid var(--border); color:var(--accent); font-family:var(--font); font-size:9px; padding:6px 10px; cursor:pointer; }
#auto-btn.active{background:rgba(0,255,180,0.2);border-color:var(--accent);}
#tabbar { position:fixed; bottom:0;left:0;right:0; height:var(--tab-h); background:rgba(2,8,6,0.97); border-top:1px solid var(--border); display:flex; z-index:100; }
.tab-btn { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:var(--font);font-size:9px;padding-bottom:4px; }
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:20px;}
.panel{position:fixed;bottom:var(--tab-h);left:0;right:0;background:var(--panel);border-top:1px solid var(--border);z-index:50;display:none;overflow-y:auto;max-height:72vh;}
.panel.active{display:block;}
.panel-title{font-size:11px;color:var(--accent);letter-spacing:3px;padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.section-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;padding:10px 16px 6px;}
#fly-controls{position:fixed;bottom:var(--tab-h);left:0;right:0;padding:8px 14px 10px;background:linear-gradient(to top,rgba(0,0,0,0.92),transparent);z-index:40;}
#status-row{display:flex;justify-content:space-between;margin-bottom:8px;padding:4px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.s-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite;}
.s-dot.warn{background:var(--warn);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.s-lbl{font-size:8px;color:var(--dim);}
#ctrl-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
.joy-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.joy-lbl{font-size:8px;color:var(--dim);letter-spacing:2px;}
.joy-base{width:92px;height:92px;border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.85);position:relative;touch-action:none;}
.joy-ring{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(0,255,180,0.1);}
.joy-knob{position:absolute;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(0,255,180,0.95),rgba(0,200,140,0.5));border:1.5px solid var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(0,255,180,0.6);pointer-events:none;}
.alt-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.alt-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.85);color:var(--accent);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;}
.alt-btn:active{background:rgba(0,255,180,0.15);}
.alt-info{display:flex;flex-direction:column;align-items:center;}
.alt-num{font-size:15px;color:var(--accent);font-weight:bold;}
.alt-unit{font-size:8px;color:var(--dim);}
#panel-depart{padding:0 0 16px;}
.city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px;}
.city-btn{background:rgba(0,20,15,0.8);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:10px 4px;cursor:pointer;text-align:center;line-height:1.4;}
.city-btn.selected{background:rgba(0,255,180,0.15);border-color:var(--accent);color:var(--accent);}
.city-flag{font-size:18px;display:block;}.city-name{font-size:10px;display:block;margin-top:2px;}
.input-row{display:flex;gap:8px;padding:8px 12px 0;}
.addr-input{flex:1;background:rgba(0,20,15,0.9);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:10px 12px;outline:none;}
.addr-input:focus{border-color:var(--accent);}
.addr-input::placeholder{color:var(--dim);font-size:11px;}
.search-btn{background:rgba(0,255,180,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:11px;padding:10px 14px;cursor:pointer;white-space:nowrap;}
.coord-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 12px 0;}
.fly-start-btn{margin:12px 12px 0;width:calc(100% - 24px);background:linear-gradient(135deg,rgba(0,255,180,0.2),rgba(0,200,140,0.1));border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:13px;letter-spacing:3px;padding:14px;cursor:pointer;text-align:center;}
#panel-log{padding:0 0 16px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(0,255,180,0.07);}
.log-place{font-size:12px;color:var(--text);}
.log-time{font-size:9px;color:var(--dim);}
.log-fly-btn{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--font);font-size:9px;padding:5px 10px;cursor:pointer;}
.log-empty{text-align:center;color:var(--dim);font-size:11px;padding:30px;}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
#loading h2{color:var(--accent);letter-spacing:6px;font-size:16px;text-shadow:0 0 20px var(--accent);}
.load-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-fill{height:100%;background:var(--accent);animation:ldanim 2s ease forwards;}
@keyframes ldanim{from{width:0}to{width:100%}}
#loading p{font-size:10px;color:var(--dim);letter-spacing:3px;animation:blink 1s infinite;}
</style>
</head>
<body>

<div id="loading">
  <h2>◈ ドローン飛行</h2>
  <div class="load-bar"><div class="load-fill"></div></div>
  <p>3D世界を構築中...</p>
</div>

<canvas id="canvas"></canvas>
<div id="scanlines"></div>
<div id="crosshair">
  <div class="ch-c tl"></div><div class="ch-c tr"></div>
  <div class="ch-c bl"></div><div class="ch-c br"></div>
</div>

<div id="hud-top">
  <div class="hud-b"><span class="hud-l">高度</span><span class="hud-v" id="alt-display">200m</span></div>
  <div class="hud-b" style="align-items:center"><span class="hud-l">◈ ドローン飛行</span><span class="hud-v" style="font-size:11px" id="mode-display">手動</span></div>
  <div class="hud-b" style="align-items:flex-end"><span class="hud-l">速度</span><span class="hud-v" id="spd-display">0 km/h</span><span style="font-size:8px;color:var(--dim)" id="ver-display">v5.0.0</span></div>
</div>
<div id="compass"><span id="compass-dir">北</span><span id="coords-display">35.6895°N 139.6917°E</span></div>

<div id="speed-mode">
  <button class="spd-btn active" id="spd-slow" onclick="setSpeed('slow')">低速</button>
  <button class="spd-btn" id="spd-mid" onclick="setSpeed('mid')">中速</button>
  <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">高速</button>
</div>
<button id="auto-btn" onclick="toggleAuto()">自動飛行</button>

<div id="fly-controls">
  <div id="status-row">
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">GPS</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl">通信</span></div>
    <div class="s-item"><div class="s-dot" id="bat-dot"></div><span class="s-lbl" id="bat-lbl">電池100%</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl" id="city-lbl">東京</span></div>
  </div>
  <div id="ctrl-row">
    <div class="joy-wrap"><span class="joy-lbl">移動</span><div class="joy-base" id="joy-move"><div class="joy-ring"></div><div class="joy-knob" id="knob-move"></div></div></div>
    <div class="alt-col">
      <button class="alt-btn" id="btn-up">▲</button>
      <div class="alt-info"><span class="alt-num" id="alt-num">200</span><span class="alt-unit">メートル</span></div>
      <button class="alt-btn" id="btn-down">▼</button>
    </div>
    <div class="joy-wrap"><span class="joy-lbl">旋回</span><div class="joy-base" id="joy-rotate"><div class="joy-ring"></div><div class="joy-knob" id="knob-rotate"></div></div></div>
  </div>
</div>

<div class="panel" id="panel-depart">
  <div class="panel-title">◈ 出発地を選ぶ</div>
  <div class="section-lbl">▸ 人気の都市</div>
  <div class="city-grid">
    <button class="city-btn" onclick="flyTo(35.6895,139.6917,'東京',this)"><span class="city-flag">🗼</span><span class="city-name">東京</span></button>
    <button class="city-btn" onclick="flyTo(34.6937,135.5023,'大阪',this)"><span class="city-flag">🏯</span><span class="city-name">大阪</span></button>
    <button class="city-btn" onclick="flyTo(35.0116,135.7681,'京都',this)"><span class="city-flag">⛩️</span><span class="city-name">京都</span></button>
    <button class="city-btn" onclick="flyTo(26.2124,127.6809,'沖縄',this)"><span class="city-flag">🌊</span><span class="city-name">沖縄</span></button>
    <button class="city-btn" onclick="flyTo(43.0642,141.3469,'札幌',this)"><span class="city-flag">❄️</span><span class="city-name">札幌</span></button>
    <button class="city-btn" onclick="flyTo(33.5904,130.4017,'福岡',this)"><span class="city-flag">🎋</span><span class="city-name">福岡</span></button>
    <button class="city-btn" onclick="flyTo(35.3606,138.7274,'富士山',this)"><span class="city-flag">🗻</span><span class="city-name">富士山</span></button>
    <button class="city-btn" onclick="flyTo(40.7128,-74.006,'NY',this)"><span class="city-flag">🗽</span><span class="city-name">NY</span></button>
    <button class="city-btn" onclick="flyTo(48.8566,2.3522,'パリ',this)"><span class="city-flag">🇫🇷</span><span class="city-name">パリ</span></button>
    <button class="city-btn" onclick="flyTo(25.2048,55.2708,'ドバイ',this)"><span class="city-flag">🌆</span><span class="city-name">ドバイ</span></button>
    <button class="city-btn" onclick="flyTo(51.5074,-0.1278,'ロンドン',this)"><span class="city-flag">🎡</span><span class="city-name">ロンドン</span></button>
    <button class="city-btn" onclick="flyTo(-33.8688,151.2093,'シドニー',this)"><span class="city-flag">🦘</span><span class="city-name">シドニー</span></button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 住所・場所で検索</div>
  <div class="input-row">
    <input class="addr-input" id="addr-input" type="text" placeholder="例：渋谷スクランブル交差点..."/>
    <button class="search-btn" onclick="searchAddress()">検索</button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 座標で指定</div>
  <div class="coord-row">
    <input class="addr-input" id="lat-input" type="number" placeholder="緯度 35.6762" step="0.0001"/>
    <input class="addr-input" id="lng-input" type="number" placeholder="経度 139.6503" step="0.0001"/>
  </div>
  <div class="input-row" style="margin-top:0"><button class="search-btn" style="flex:1" onclick="flyToCoords()">この座標へ移動</button></div>
  <button class="fly-start-btn" onclick="startFlight()">◈ 飛行開始</button>
</div>

<div class="panel" id="panel-log">
  <div class="panel-title">◈ 飛行記録</div>
  <div id="log-list"><div class="log-empty">まだ記録がありません</div></div>
</div>

<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('fly')"><span class="tab-icon">🚁</span>飛行</button>
  <button class="tab-btn" onclick="switchTab('depart')"><span class="tab-icon">📍</span>出発地</button>
  <button class="tab-btn" onclick="switchTab('log')"><span class="tab-icon">📋</span>記録</button>
</div>

<script>
// ===== 定数 =====
const DIRS = ['北','北東','東','南東','南','南西','西','北西'];
const SPEED_MAP = { slow:15, mid:60, fast:250 };

// ===== 状態 =====
const S = {
  lat:35.6895, lng:139.6917, alt:200,
  heading:0, speed:0, speedMode:'slow',
  autoFly:false, autoAngle:0,
  battery:100,
  joyActive:false, joyDx:0, joyDy:0,
  rotActive:false, rotDx:0, altDir:0,
  log:[], currentCity:'東京',
};

// ===== Three.js =====
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas:canvas, antialias:false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xb0d8f0, 0.0004);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 1, 8000);

// 照明
scene.add(new THREE.AmbientLight(0xaaccff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(500, 800, 300);
scene.add(sun);

// 地面
const groundGeo = new THREE.PlaneGeometry(8000, 8000, 10, 10);
const groundMat = new THREE.MeshLambertMaterial({ color:0x3d7a2a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 道路グリッド
function createRoads() {
  const mat = new THREE.MeshLambertMaterial({ color:0x555555 });
  for (let i = -2000; i <= 2000; i += 100) {
    const hGeo = new THREE.PlaneGeometry(4000, 8);
    const hMesh = new THREE.Mesh(hGeo, mat);
    hMesh.rotation.x = -Math.PI/2;
    hMesh.position.set(0, 0.1, i);
    scene.add(hMesh);
    const vGeo = new THREE.PlaneGeometry(8, 4000);
    const vMesh = new THREE.Mesh(vGeo, mat);
    vMesh.rotation.x = -Math.PI/2;
    vMesh.position.set(i, 0.1, 0);
    scene.add(vMesh);
  }
}
createRoads();

// 建物生成
function createBuildings() {
  const colors = [0x8899aa, 0x667788, 0x99aabb, 0xaabbcc, 0x778899, 0xbbccdd, 0x556677];
  for (let bx = -2000; bx <= 2000; bx += 100) {
    for (let bz = -2000; bz <= 2000; bz += 100) {
      if (Math.random() < 0.6) {
        const w = 20 + Math.random() * 40;
        const d = 20 + Math.random() * 40;
        const h = 10 + Math.random() * 120;
        const geo = new THREE.BoxGeometry(w, h, d);
        const mat = new THREE.MeshLambertMaterial({
          color: colors[Math.floor(Math.random()*colors.length)]
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(
          bx + (Math.random()-0.5)*60,
          h/2,
          bz + (Math.random()-0.5)*60
        );
        scene.add(mesh);
      }
    }
  }
}
createBuildings();

// 木
function createTrees() {
  for (let i = 0; i < 300; i++) {
    const x = (Math.random()-0.5)*3000;
    const z = (Math.random()-0.5)*3000;
    const h = 5 + Math.random()*10;
    const trunkGeo = new THREE.CylinderGeometry(0.5,0.8,h,6);
    const trunkMat = new THREE.MeshLambertMaterial({color:0x5c3d1e});
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(x,h/2,z);
    scene.add(trunk);
    const leafGeo = new THREE.SphereGeometry(3+Math.random()*2,6,5);
    const leafMat = new THREE.MeshLambertMaterial({color:0x2d6e1e});
    const leaf = new THREE.Mesh(leafGeo,leafMat);
    leaf.position.set(x,h+2,z);
    scene.add(leaf);
  }
}
createTrees();

// 水面（海/川）
const waterGeo = new THREE.PlaneGeometry(600,200);
const waterMat = new THREE.MeshLambertMaterial({color:0x1a6896, transparent:true, opacity:0.8});
const water = new THREE.Mesh(waterGeo,waterMat);
water.rotation.x = -Math.PI/2;
water.position.set(800,0.2,500);
scene.add(water);

// ===== カメラ更新 =====
function updateCamera() {
  const headRad = S.heading * Math.PI/180;
  const pitchRad = -20 * Math.PI/180;
  camera.position.set(0, S.alt, 0);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = -headRad;
  camera.rotation.x = pitchRad;
}

// ===== メインループ =====
function mainLoop() {
  if (S.autoFly) {
    S.autoAngle += 0.008;
    S.heading = (S.heading + 0.3) % 360;
    S.speed = 40;
    S.alt = 200 + Math.sin(S.autoAngle)*60;
    // ワールドを動かす（ドローンは原点固定）
    scene.position.x -= Math.sin(S.heading*Math.PI/180)*0.5;
    scene.position.z -= Math.cos(S.heading*Math.PI/180)*0.5;
  } else {
    if (S.joyActive) {
      const spd = SPEED_MAP[S.speedMode];
      const mag = Math.sqrt(S.joyDx**2+S.joyDy**2);
      const headRad = S.heading*Math.PI/180;
      const fwd = -S.joyDy*mag, str = S.joyDx*mag;
      const mv = spd*0.016;
      // ワールドを逆方向に動かす
      scene.position.x -= (Math.sin(headRad)*fwd + Math.cos(headRad)*str)*mv;
      scene.position.z -= (Math.cos(headRad)*fwd - Math.sin(headRad)*str)*mv;
      S.speed = Math.round(spd*mag*3.6/10);
      // 緯度経度も更新
      S.lat -= (Math.cos(headRad)*fwd - Math.sin(headRad)*str)*mv*0.000009;
      S.lng += (Math.sin(headRad)*fwd + Math.cos(headRad)*str)*mv*0.000009;
    } else {
      S.speed = Math.max(0, S.speed-1);
    }
    if (S.rotActive) S.heading = (S.heading + S.rotDx*2)%360;
  }
  if (S.altDir !== 0) S.alt = Math.max(10, Math.min(2000, S.alt+S.altDir*4));
  updateCamera();
  updateHUD();
}

function updateHUD() {
  document.getElementById('alt-display').textContent = Math.round(S.alt)+'m';
  document.getElementById('alt-display').className = 'hud-v'+(S.alt<20?' danger':S.alt<50?' warn':'');
  document.getElementById('spd-display').textContent = Math.round(S.speed)+' km/h';
  document.getElementById('alt-num').textContent = Math.round(S.alt);
  document.getElementById('coords-display').textContent = S.lat.toFixed(4)+'°N '+S.lng.toFixed(4)+'°E';
  document.getElementById('mode-display').textContent = S.autoFly?'自動飛行':'手動';
  const di = Math.round(((S.heading%360)+360)%360/45)%8;
  document.getElementById('compass-dir').textContent = DIRS[di];
}

// ===== ジョイスティック =====
function setupJoy(baseId, knobId, isRot) {
  const base=document.getElementById(baseId), knob=document.getElementById(knobId);
  const R=30; let sx,sy;
  function gp(e){const t=e.touches?.[0]||e;return{x:t.clientX,y:t.clientY};}
  base.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=base.getBoundingClientRect();
    sx=r.left+r.width/2; sy=r.top+r.height/2;
    if(isRot)S.rotActive=true; else S.joyActive=true;
    mv(e);
  },{passive:false});
  function mv(e){
    if(isRot?!S.rotActive:!S.joyActive)return;
    e.preventDefault();
    const p=gp(e); let dx=p.x-sx,dy=p.y-sy;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>R){dx=dx/d*R;dy=dy/d*R;}
    if(isRot)S.rotDx=dx/R; else{S.joyDx=dx/R;S.joyDy=dy/R;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  }
  function en(){
    if(isRot){S.rotActive=false;S.rotDx=0;} else{S.joyActive=false;S.joyDx=0;S.joyDy=0;}
    knob.style.transform='translate(-50%,-50%)';
  }
  base.addEventListener('touchmove',mv,{passive:false});
  base.addEventListener('touchend',en);
  base.addEventListener('mousedown',e=>{sx=e.clientX;sy=e.clientY;if(isRot)S.rotActive=true;else S.joyActive=true;});
  window.addEventListener('mousemove',mv);
  window.addEventListener('mouseup',en);
}
setupJoy('joy-move','knob-move',false);
setupJoy('joy-rotate','knob-rotate',true);

const up=document.getElementById('btn-up'),dn=document.getElementById('btn-down');
up.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=1;},{passive:false});
dn.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=-1;},{passive:false});
[up,dn].forEach(b=>b.addEventListener('touchend',()=>S.altDir=0));
up.addEventListener('mousedown',()=>S.altDir=1);
dn.addEventListener('mousedown',()=>S.altDir=-1);
window.addEventListener('mouseup',()=>S.altDir=0);

setInterval(()=>{
  S.battery=Math.max(0,S.battery-0.04);
  const p=Math.round(S.battery);
  document.getElementById('bat-lbl').textContent='電池'+p+'%';
  if(p<20)document.getElementById('bat-dot').className='s-dot warn';
},3000);

// ===== UI関数 =====
function setSpeed(m){
  S.speedMode=m;
  ['slow','mid','fast'].forEach(x=>document.getElementById('spd-'+x).classList.toggle('active',x===m));
}
function toggleAuto(){
  S.autoFly=!S.autoFly;
  const b=document.getElementById('auto-btn');
  b.textContent=S.autoFly?'■ 停止':'自動飛行';
  b.classList.toggle('active',S.autoFly);
}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['fly','depart','log'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const show=tab==='fly';
  document.getElementById('fly-controls').style.display=show?'block':'none';
  document.getElementById('auto-btn').style.display=show?'block':'none';
  document.getElementById('speed-mode').style.display=show?'flex':'none';
  if(tab==='depart')document.getElementById('panel-depart').classList.add('active');
  if(tab==='log')document.getElementById('panel-log').classList.add('active');
}
function flyTo(lat,lng,name,btn){
  S.lat=lat;S.lng=lng;S.currentCity=name;S.alt=300;S.speed=0;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('selected'));
  if(btn)btn.classList.add('selected');
  document.getElementById('city-lbl').textContent=name;
}
async function searchAddress(){
  const q=document.getElementById('addr-input').value.trim();
  if(!q)return;
  try{
    const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1');
    const data=await res.json();
    if(data.length>0){
      flyTo(parseFloat(data[0].lat),parseFloat(data[0].lon),q,null);
      alert('「'+q+'」が見つかりました！飛行開始を押してください。');
    }else{alert('場所が見つかりませんでした。');}
  }catch(e){alert('検索エラーが発生しました。');}
}
function flyToCoords(){
  const lat=parseFloat(document.getElementById('lat-input').value);
  const lng=parseFloat(document.getElementById('lng-input').value);
  if(isNaN(lat)||isNaN(lng)){alert('緯度・経度を正しく入力してください');return;}
  flyTo(lat,lng,lat.toFixed(3)+','+lng.toFixed(3),null);
}
function startFlight(){
  S.log.unshift({place:S.currentCity,lat:S.lat,lng:S.lng,time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});
  renderLog();switchTab('fly');
}
function renderLog(){
  const el=document.getElementById('log-list');
  if(!S.log.length){el.innerHTML='<div class="log-empty">まだ記録がありません</div>';return;}
  el.innerHTML=S.log.slice(0,20).map(e=>`<div class="log-item"><div><div class="log-place">📍 ${e.place}</div><div class="log-time">${e.time}</div></div><button class="log-fly-btn" onclick="flyTo(${e.lat},${e.lng},'${e.place}',null);switchTab('fly')">再訪</button></div>`).join('');
}
</script>
