<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ドローン飛行</title>
<script>const APP_VERSION='CLEAN-4.0.0';</script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
:root{
  --bg:#071018;
  --bg2:#0b1722;
  --glass:rgba(8,18,28,.64);
  --glass2:rgba(8,18,28,.82);
  --line:rgba(205,235,255,.15);
  --line2:rgba(46,255,198,.28);
  --text:#eef8ff;
  --muted:rgba(238,248,255,.62);
  --weak:rgba(238,248,255,.38);
  --accent:#2effc6;
  --accent2:#38bdf8;
  --warn:#ffcb6b;
  --danger:#ff6978;
  --shadow:0 18px 60px rgba(0,0,0,.35);
  --radius:22px;
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Roboto Mono','Cascadia Mono',ui-monospace,monospace;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#05090d;color:var(--text);font-family:var(--font);touch-action:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button,input{font:inherit;}
button{cursor:pointer;color:inherit;}
#cesiumContainer{position:fixed;inset:0;background:#05090d;}
.cesium-viewer-bottom,.cesium-viewer-animationContainer,.cesium-viewer-timelineContainer,.cesium-viewer-toolbar,.cesium-viewer-fullscreenContainer,.cesium-viewer-geocoderContainer,.cesium-credit-lightbox,.cesium-credit-textContainer{display:none!important;}
.cesium-widget-credits{display:none!important;}

body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:4;background:radial-gradient(circle at 50% 35%,transparent 0 48%,rgba(0,0,0,.18) 70%,rgba(0,0,0,.52) 100%);}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:5;background:linear-gradient(to bottom,rgba(4,10,16,.68),transparent 26%,transparent 66%,rgba(3,7,10,.78));}
#crosshair{position:fixed;left:50%;top:50%;width:58px;height:58px;transform:translate(-50%,-50%);z-index:18;pointer-events:none;opacity:.72;filter:drop-shadow(0 0 8px rgba(46,255,198,.28));}
#crosshair::before,#crosshair::after{content:"";position:absolute;background:rgba(46,255,198,.72);}
#crosshair::before{left:0;right:0;top:50%;height:1px;}
#crosshair::after{top:0;bottom:0;left:50%;width:1px;}
.corner{position:absolute;width:13px;height:13px;border-color:rgba(46,255,198,.85);border-style:solid;}
.corner.tl{left:0;top:0;border-width:2px 0 0 2px}.corner.tr{right:0;top:0;border-width:2px 2px 0 0}.corner.bl{left:0;bottom:0;border-width:0 0 2px 2px}.corner.br{right:0;bottom:0;border-width:0 2px 2px 0}

/* 起動 */
#boot{position:fixed;inset:0;z-index:3000;background:radial-gradient(circle at 50% 38%,#102335 0,#071018 48%,#020408 100%);display:flex;align-items:center;justify-content:center;padding:24px;}
#boot.hide{display:none;}
.boot-card{width:min(420px,92vw);border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.025));box-shadow:var(--shadow);padding:30px 24px;text-align:center;backdrop-filter:blur(22px);}
.boot-mark{width:58px;height:58px;border-radius:20px;margin:0 auto 16px;display:grid;place-items:center;border:1px solid var(--line2);background:rgba(46,255,198,.08);box-shadow:0 0 28px rgba(46,255,198,.16);font-size:26px;}
.boot-title{font-size:22px;font-weight:800;letter-spacing:.08em;margin-bottom:6px;}
.boot-ver{font-family:var(--mono);font-size:11px;color:var(--accent2);letter-spacing:.16em;margin-bottom:20px;}
.boot-bar{height:6px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden;margin-bottom:14px;}
.boot-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .38s ease;}
.boot-status{font-size:12px;color:var(--muted);letter-spacing:.08em;min-height:20px;}

/* 出発地選択 */
#picker{position:fixed;inset:0;z-index:2400;display:none;flex-direction:column;background:radial-gradient(circle at 78% 6%,rgba(56,189,248,.16),transparent 34%),linear-gradient(160deg,#06101a,#101c27 55%,#071018);padding:calc(18px + var(--sat)) calc(16px + var(--sar)) calc(18px + var(--sab)) calc(16px + var(--sal));}
.picker-shell{width:min(980px,100%);height:100%;margin:0 auto;display:flex;flex-direction:column;min-height:0;}
.hero{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px;}
.brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:12px;min-width:0;}
.brand-icon{width:48px;height:48px;border-radius:17px;display:grid;place-items:center;background:rgba(46,255,198,.10);border:1px solid var(--line2);box-shadow:0 0 26px rgba(46,255,198,.12);font-size:22px;}
.brand h1{font-size:24px;letter-spacing:.03em;line-height:1.12;}
.brand p{font-size:12px;color:var(--muted);margin-top:3px;}
.badge{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--line2);background:rgba(46,255,198,.08);border-radius:999px;padding:8px 10px;white-space:nowrap;}
.search-panel{display:grid;grid-template-columns:1fr;gap:10px;padding:12px;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;backdrop-filter:blur(18px);}
.search-input{width:100%;height:48px;border-radius:15px;border:1px solid var(--line);background:rgba(3,8,13,.52);color:var(--text);padding:0 14px;outline:none;}
.search-input:focus{border-color:rgba(46,255,198,.7);box-shadow:0 0 0 3px rgba(46,255,198,.10);}
.search-input::placeholder{color:var(--weak);}
.quick-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:1px;-webkit-overflow-scrolling:touch;}
.quick{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:999px;padding:10px 13px;font-size:12px;color:var(--muted);}
.quick:active{transform:scale(.98);}
.view{display:flex;flex-direction:column;min-height:0;flex:1;}
.view-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 2px 12px;}
.view-title{font-size:13px;color:var(--muted);letter-spacing:.13em;text-transform:uppercase;}
.view-count{font-family:var(--mono);font-size:12px;color:var(--accent2);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:10px;overflow-y:auto;min-height:0;padding:2px 2px 20px;-webkit-overflow-scrolling:touch;}
.card-btn{min-height:68px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:0 12px 30px rgba(0,0,0,.12);padding:12px;text-align:left;display:flex;flex-direction:column;justify-content:space-between;gap:8px;}
.card-btn .name{font-size:15px;font-weight:750;line-height:1.2;}
.card-btn .meta{font-size:11px;color:var(--muted);font-family:var(--mono);}
.card-btn:hover,.card-btn:active{border-color:rgba(46,255,198,.55);background:rgba(46,255,198,.08);}
.city-card{min-height:76px;}
.city-card .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.lod{color:var(--accent);}
#back-pref{height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.055);padding:0 14px;color:var(--text);}
#city-head-name{font-size:18px;font-weight:800;color:var(--accent);}
.status-line{font-size:12px;color:var(--muted);text-align:center;padding:10px 4px 0;min-height:30px;}

/* 読み込み */
#loading{position:fixed;inset:0;z-index:2200;display:none;align-items:center;justify-content:center;background:rgba(2,6,10,.72);backdrop-filter:blur(18px);padding:24px;}
#loading.show{display:flex;}
.loading-card{width:min(420px,92vw);border:1px solid var(--line);border-radius:28px;background:rgba(8,18,28,.84);box-shadow:var(--shadow);padding:28px 22px;text-align:center;}
.spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.10);border-top-color:var(--accent);margin:0 auto 16px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:20px;font-weight:800;margin-bottom:8px;}
.load-sub{font-size:13px;color:var(--muted);line-height:1.65;white-space:pre-wrap;}

/* HUD */
#hud-top{position:fixed;top:0;left:0;right:0;z-index:30;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:start;padding:calc(10px + var(--sat)) calc(12px + var(--sar)) 0 calc(12px + var(--sal));pointer-events:none;}
.hud-card{min-width:96px;border:1px solid var(--line);border-radius:18px;background:rgba(8,18,28,.52);backdrop-filter:blur(14px);box-shadow:0 10px 30px rgba(0,0,0,.16);padding:10px 12px;}
.hud-card.right{text-align:right;justify-self:end;}
.hud-label{display:block;font-size:10px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:2px;}
.hud-value{font-family:var(--mono);font-size:25px;font-weight:800;line-height:1;color:white;}
.hud-value .unit{font-size:12px;color:var(--accent);margin-left:3px;}
.center-chip{align-self:start;text-align:center;border:1px solid var(--line);border-radius:999px;background:rgba(8,18,28,.48);padding:9px 14px;backdrop-filter:blur(14px);box-shadow:0 10px 30px rgba(0,0,0,.14);}
#compass-dir{display:block;font-size:15px;font-weight:800;letter-spacing:.08em;}
#place-name{display:block;margin-top:2px;max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--muted);}
#env-bar{position:fixed;top:calc(88px + var(--sat));left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:12px;align-items:center;max-width:calc(100vw - 24px);overflow:hidden;white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:rgba(8,18,28,.48);backdrop-filter:blur(14px);box-shadow:0 10px 30px rgba(0,0,0,.12);padding:7px 12px;font-family:var(--mono);font-size:11px;color:var(--muted);pointer-events:none;}
#env-temp{color:var(--accent);}#env-coords{color:var(--weak);}

/* 操作 */
#controls{position:fixed;left:0;right:0;bottom:0;z-index:40;padding:0 calc(12px + var(--sar)) calc(10px + var(--sab)) calc(12px + var(--sal));display:none;}
.control-card{width:min(720px,100%);margin:0 auto;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg,rgba(8,18,28,.62),rgba(8,18,28,.88));box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:10px 10px 12px;}
.control-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
#speed-mode{display:flex;gap:4px;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:15px;padding:3px;}
.spd-btn{height:34px;border:0;background:transparent;color:var(--muted);border-radius:12px;padding:0 12px;font-size:12px;font-weight:700;}
.spd-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#031018;box-shadow:0 8px 18px rgba(46,255,198,.18);}
.control-spacer{flex:1;}
.icon-btn{height:40px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.055);padding:0 12px;font-size:12px;color:var(--muted);white-space:nowrap;}
.icon-btn.primary{color:var(--accent);border-color:var(--line2);background:rgba(46,255,198,.08);}
.control-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;}
.joy-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.joy-label{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;}
.joy{width:118px;height:118px;border-radius:50%;position:relative;border:1px solid var(--line2);background:radial-gradient(circle,rgba(46,255,198,.10),rgba(5,12,18,.72) 62%);box-shadow:inset 0 0 24px rgba(46,255,198,.08);touch-action:none;}
.joy.blue{border-color:rgba(56,189,248,.35);background:radial-gradient(circle,rgba(56,189,248,.10),rgba(5,12,18,.72) 62%);}
.joy::before,.joy::after{content:"";position:absolute;background:rgba(255,255,255,.10);}
.joy::before{left:16px;right:16px;top:50%;height:1px}.joy::after{top:16px;bottom:16px;left:50%;width:1px}
.knob{position:absolute;left:50%;top:50%;width:44px;height:44px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 30%,#fff 0,#91ffe5 18%,var(--accent) 58%,#119b80 100%);box-shadow:0 0 22px rgba(46,255,198,.46);pointer-events:none;}
.knob.blue{background:radial-gradient(circle at 35% 30%,#fff 0,#9ce9ff 18%,var(--accent2) 58%,#147aa2 100%);box-shadow:0 0 22px rgba(56,189,248,.46);}
.alt-col{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:70px;}
.alt-btn{width:58px;height:46px;border-radius:16px;border:1px solid var(--line2);background:rgba(46,255,198,.08);color:var(--accent);font-size:20px;}
.alt-read{font-family:var(--mono);font-size:20px;font-weight:800;color:white;line-height:1;}
.alt-unit{font-size:10px;color:var(--weak);}
#toast{position:fixed;left:50%;bottom:calc(206px + var(--sab));transform:translateX(-50%);z-index:2600;max-width:calc(100vw - 28px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--line2);border-radius:999px;background:rgba(5,14,20,.9);box-shadow:0 16px 42px rgba(0,0,0,.28);padding:10px 15px;font-size:12px;color:var(--accent);opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

@media (max-width:560px){
  .brand h1{font-size:21px}.brand-icon{width:44px;height:44px}.badge{display:none}
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;}
  #hud-top{grid-template-columns:1fr auto 1fr;gap:7px;}.hud-card{min-width:82px;padding:9px 10px}.hud-value{font-size:22px}.center-chip{padding:8px 10px}.joy{width:108px;height:108px}.knob{width:42px;height:42px}.control-grid{gap:6px}.control-card{border-radius:24px}.icon-btn{padding:0 9px}.spd-btn{padding:0 10px;}
}
@media (max-width:390px){.joy{width:100px;height:100px}.alt-btn{width:52px;height:42px}.control-top{gap:6px}.icon-btn{font-size:11px;padding:0 8px}.spd-btn{padding:0 8px}}
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="crosshair"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></div>

<div id="boot">
  <div class="boot-card">
    <div class="boot-mark">◇</div>
    <div class="boot-title">ドローン飛行</div>
    <div class="boot-ver" id="boot-ver">--</div>
    <div class="boot-bar"><div class="boot-fill" id="boot-fill"></div></div>
    <div class="boot-status" id="boot-status">起動中...</div>
  </div>
</div>

<div id="picker">
  <div class="picker-shell">
    <section class="hero">
      <div class="brand-row">
        <div class="brand">
          <div class="brand-icon">✈</div>
          <div><h1>Real City Drone</h1><p>PLATEAU 3D都市モデルで飛ぶ。飾りではなく、実データ優先。</p></div>
        </div>
        <div class="badge" id="catalog-badge">読み込み中</div>
      </div>
      <div class="search-panel">
        <input class="search-input" id="global-search" type="search" placeholder="都道府県・都市名で検索 例：岩手 / 盛岡 / 徳島 / 東京">
        <div class="quick-row">
          <button class="quick" onclick="quickLaunch('岩手','盛岡')">盛岡</button>
          <button class="quick" onclick="quickLaunch('徳島','鳴門')">鳴門</button>
          <button class="quick" onclick="quickLaunch('東京','新宿')">新宿</button>
          <button class="quick" onclick="quickLaunch('大阪','大阪')">大阪</button>
          <button class="quick" onclick="quickLaunch('京都','京都')">京都</button>
          <button class="quick" onclick="quickLaunch('北海道','札幌')">札幌</button>
        </div>
      </div>
    </section>

    <div id="pref-view" class="view">
      <div class="view-head"><span class="view-title">出発する都道府県</span><span class="view-count" id="pref-count">--</span></div>
      <div id="pref-list" class="grid"></div>
      <div class="status-line" id="pick-status">整備都市を取得中...</div>
    </div>

    <div id="city-view" class="view" style="display:none">
      <div class="view-head">
        <button id="back-pref" onclick="backToPref()">‹ 都道府県</button>
        <span id="city-head-name">--</span>
        <span class="view-count" id="city-count">--</span>
      </div>
      <input class="search-input" id="city-search" type="search" placeholder="この都道府県内で都市検索" style="margin-bottom:10px">
      <div id="city-list" class="grid"></div>
    </div>
  </div>
</div>

<div id="loading">
  <div class="loading-card">
    <div class="spinner"></div>
    <div class="load-title">街を構築中</div>
    <div class="load-sub" id="load-sub">3D都市モデルを読み込んでいます</div>
  </div>
</div>

<div id="hud-top">
  <div class="hud-card"><span class="hud-label">高度</span><span class="hud-value"><span id="alt-num">220</span><span class="unit">m</span></span></div>
  <div class="center-chip"><span id="compass-dir">北</span><span id="place-name">出発地未選択</span></div>
  <div class="hud-card right"><span class="hud-label">速度</span><span class="hud-value"><span id="spd-num">0</span><span class="unit">km/h</span></span></div>
</div>
<div id="env-bar"><span id="env-time">--:--</span><span id="env-temp">--°C</span><span id="env-coords">--</span></div>

<div id="controls">
  <div class="control-card">
    <div class="control-top">
      <div id="speed-mode">
        <button class="spd-btn" id="spd-slow" onclick="setSpeed('slow')">低速</button>
        <button class="spd-btn active" id="spd-mid" onclick="setSpeed('mid')">中速</button>
        <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">高速</button>
      </div>
      <div class="control-spacer"></div>
      <button class="icon-btn" id="snd-btn" onclick="toggleSound()">音OFF</button>
      <button class="icon-btn primary" onclick="backToPicker()">街変更</button>
    </div>
    <div class="control-grid">
      <div class="joy-wrap"><span class="joy-label">移動</span><div class="joy" id="joy-move"><div class="knob" id="knob-move"></div></div></div>
      <div class="alt-col">
        <button class="alt-btn" id="alt-up" aria-label="高度上昇">▲</button>
        <span class="alt-read" id="alt-val2">220</span><span class="alt-unit">meters</span>
        <button class="alt-btn" id="alt-down" aria-label="高度下降">▼</button>
      </div>
      <div class="joy-wrap"><span class="joy-label" style="color:var(--accent2)">視点</span><div class="joy blue" id="joy-look"><div class="knob blue" id="knob-look"></div></div></div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ============================================================
// 状態
// ============================================================
const S = {
  lat:35.681236, lng:139.767125, alt:220, groundH:0,
  heading:0, pitch:-22, speedMode:'mid', vx:0, vz:0, dHeading:0, dPitch:0,
  altDir:0, speed:0, flying:false, soundOn:false, sampling:false, lastGroundSample:0
};
const SPEED = { slow:55, mid:150, fast:330 }; // km/h
const ALT_RATE = { slow:42, mid:82, fast:140 }; // m/s
const DIRS = ['北','北東','東','南東','南','南西','西','北西'];
const MIN_REL_ALT = 18;
const START_REL_ALT = 220;
let viewer, currentTileset=null, allCities={}, selectedPref=null, cityFilter='';

// ============================================================
// Cesium初期化
// ============================================================
function showToast(msg, ms=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer=setTimeout(()=>t.classList.remove('show'), ms);
}
function bootProgress(pct,msg){
  const f=document.getElementById('boot-fill'); if(f) f.style.width=pct+'%';
  const s=document.getElementById('boot-status'); if(s && msg) s.textContent=msg;
}
function bootDone(){
  document.getElementById('boot').classList.add('hide');
  document.getElementById('picker').style.display='flex';
}
function gsiDemTerrain(){
  const TILE=256, GSI_MAX=14;
  const cv=document.createElement('canvas'); cv.width=TILE; cv.height=TILE;
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  return new Cesium.CustomHeightmapTerrainProvider({
    width:64, height:64, tilingScheme:new Cesium.WebMercatorTilingScheme(),
    callback:function(x,y,level){
      const z=Math.min(level,GSI_MAX);
      const scale=Math.pow(2,level-z);
      const gx=Math.floor(x/scale), gy=Math.floor(y/scale);
      const url='https://cyberjapandata.gsi.go.jp/xyz/dem_png/'+z+'/'+gx+'/'+gy+'.png';
      const W=64,H=64;
      return new Promise(function(resolve){
        const img=new Image(); img.crossOrigin='anonymous';
        img.onload=function(){
          ctx.clearRect(0,0,TILE,TILE); ctx.drawImage(img,0,0,TILE,TILE);
          let d; try{ d=ctx.getImageData(0,0,TILE,TILE).data; }catch(e){ resolve(new Float32Array(W*H)); return; }
          const out=new Float32Array(W*H);
          const sub=TILE/scale, ox=(x-gx*scale)*sub, oy=(y-gy*scale)*sub;
          for(let j=0;j<H;j++) for(let i=0;i<W;i++){
            const px=Math.min(TILE-1,Math.floor(ox+(i/(W-1))*sub));
            const py=Math.min(TILE-1,Math.floor(oy+(j/(H-1))*sub));
            const k=(py*TILE+px)*4, r=d[k],g=d[k+1],b=d[k+2],a=d[k+3];
            let h=0;
            if(a!==0){ const v=r*65536+g*256+b; if(v<8388608)h=v*0.01; else if(v>8388608)h=(v-16777216)*0.01; }
            out[j*W+i]=h;
          }
          resolve(out);
        };
        img.onerror=function(){ resolve(new Float32Array(W*H)); };
        img.src=url;
      });
    }
  });
}
function initCesium(){
  if(!window.Cesium){ showToast('Cesiumの読み込みに失敗しました'); return; }
  viewer = new Cesium.Viewer('cesiumContainer', {
    baseLayer: new Cesium.ImageryLayer(new Cesium.UrlTemplateImageryProvider({
      url:'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
      maximumLevel:18, minimumLevel:2, credit:'地理院タイル'
    }), {}),
    terrainProvider: gsiDemTerrain(),
    baseLayerPicker:false, geocoder:false, homeButton:false, sceneModePicker:false,
    navigationHelpButton:false, animation:false, timeline:false, fullscreenButton:false,
    infoBox:false, selectionIndicator:false, shouldAnimate:true
  });
  viewer.scene.globe.depthTestAgainstTerrain = true;
  viewer.scene.globe.maximumScreenSpaceError = 1.35;
  viewer.scene.fog.enabled = true;
  viewer.scene.fog.density = 0.00018;
  viewer.scene.skyAtmosphere.show = true;
  const ssc=viewer.scene.screenSpaceCameraController;
  ssc.enableRotate=false; ssc.enableTranslate=false; ssc.enableZoom=false; ssc.enableTilt=false; ssc.enableLook=false;
  applyCamera();
}

// ============================================================
// 天気・音
// ============================================================
let envTemp=null, envUtcOffset=null, envWeatherCode=null;
function localNow(){ return envUtcOffset===null ? new Date() : new Date(Date.now()+envUtcOffset*1000); }
function localTimeStr(){
  const d=localNow();
  const h=envUtcOffset===null ? d.getHours() : d.getUTCHours();
  const m=envUtcOffset===null ? d.getMinutes() : d.getUTCMinutes();
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function weatherIcon(c){
  if(c===null) return '';
  if(c<=1) return '☀'; if(c<=3) return '⛅'; if(c<=48) return '霧';
  if(c>=95) return '雷'; if((c>=71&&c<=77)||c===85||c===86) return '雪';
  if(c>=51) return '雨'; return '';
}
async function fetchWeather(lat,lng){
  try{
    const ctrl=new AbortController(); const tm=setTimeout(()=>ctrl.abort(),8000);
    const url='https://api.open-meteo.com/v1/forecast?latitude='+lat.toFixed(3)+'&longitude='+lng.toFixed(3)+'&current=temperature_2m,weather_code&timezone=auto';
    const res=await fetch(url,{signal:ctrl.signal}); clearTimeout(tm);
    const js=await res.json();
    if(js && js.current && typeof js.current.temperature_2m==='number'){
      envTemp=js.current.temperature_2m;
      if(typeof js.current.weather_code==='number') envWeatherCode=js.current.weather_code;
      if(typeof js.utc_offset_seconds==='number') envUtcOffset=js.utc_offset_seconds;
    }
  }catch(e){}
}
function updateEnvBar(){
  document.getElementById('env-time').textContent=localTimeStr();
  document.getElementById('env-temp').textContent=(envTemp===null?'--':envTemp.toFixed(1))+'°C '+weatherIcon(envWeatherCode);
  document.getElementById('env-coords').textContent=Math.abs(S.lat).toFixed(4)+(S.lat>=0?'N':'S')+' '+Math.abs(S.lng).toFixed(4)+(S.lng>=0?'E':'W');
}
const AU={ctx:null,gain:null,lp:null};
function initAudio(){
  if(AU.ctx) return true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return false;
    AU.ctx=new AC();
    const len=AU.ctx.sampleRate*2;
    const buf=AU.ctx.createBuffer(1,len,AU.ctx.sampleRate);
    const ch=buf.getChannelData(0); let last=0;
    for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=(last+0.025*w)/1.025; ch[i]=last*4; }
    const src=AU.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    AU.lp=AU.ctx.createBiquadFilter(); AU.lp.type='lowpass'; AU.lp.frequency.value=300; AU.lp.Q.value=1.15;
    AU.gain=AU.ctx.createGain(); AU.gain.gain.value=0;
    src.connect(AU.lp); AU.lp.connect(AU.gain); AU.gain.connect(AU.ctx.destination); src.start();
    return true;
  }catch(e){ return false; }
}
function toggleSound(){
  if(!S.soundOn){
    if(!initAudio()){ showToast('この環境では音を開始できません'); return; }
    if(AU.ctx.state==='suspended') AU.ctx.resume();
    S.soundOn=true; document.getElementById('snd-btn').textContent='音ON';
  }else{
    S.soundOn=false; if(AU.gain) AU.gain.gain.value=0; document.getElementById('snd-btn').textContent='音OFF';
  }
}

// ============================================================
// 都市カタログ
// ============================================================
document.getElementById('boot-ver').textContent='VER '+APP_VERSION;
document.getElementById('global-search').addEventListener('input',()=>{ buildPrefList(); });
document.getElementById('city-search').addEventListener('input',e=>{ cityFilter=e.target.value.trim(); buildCityList(); });
(async function loadCatalog(){
  bootProgress(12,'エンジン起動中...');
  initCesium();
  try{
    bootProgress(36,'PLATEAU都市カタログ取得中...');
    const res=await fetch('https://api.plateauview.mlit.go.jp/datacatalog/plateau-datasets');
    const data=await res.json();
    bootProgress(68,'3D Tilesを整理中...');
    const rows=(data.datasets||[]).filter(d=>d.type_en==='bldg' && d.format==='3D Tiles' && d.url && d.pref && d.city);
    const byCity={};
    for(const d of rows){
      const key=d.pref+'|'+d.city;
      const lod=parseInt(d.lod,10)||1;
      if(!byCity[key] || lod < byCity[key].lod){ byCity[key]={pref:d.pref, city:d.city, url:d.url, lod:lod}; }
    }
    allCities={};
    Object.values(byCity).forEach(c=>{ if(!allCities[c.pref]) allCities[c.pref]=[]; allCities[c.pref].push(c); });
    Object.keys(allCities).forEach(p=>allCities[p].sort((a,b)=>a.city.localeCompare(b.city,'ja')));
    const prefN=Object.keys(allCities).length, cityN=Object.keys(byCity).length;
    document.getElementById('catalog-badge').textContent=prefN+'都道府県 / '+cityN+'都市';
    document.getElementById('pick-status').textContent='出発地を選んでください。まず選択画面から迷子、アプリとしては正しい挙動です。';
    buildPrefList();
    bootProgress(100,'完了');
    setTimeout(bootDone,420);
  }catch(e){
    bootProgress(100,'取得エラー');
    document.getElementById('catalog-badge').textContent='取得失敗';
    document.getElementById('pick-status').textContent='PLATEAUカタログを取得できませんでした。通信環境かAPI側を確認してください。';
    setTimeout(bootDone,420);
  }
})();
function norm(s){ return String(s||'').toLowerCase().replace(/\s+/g,''); }
function getGlobalQuery(){ return norm(document.getElementById('global-search').value); }
function buildPrefList(){
  const wrap=document.getElementById('pref-list'); wrap.innerHTML='';
  const q=getGlobalQuery();
  const prefs=Object.keys(allCities).sort((a,b)=>allCities[b].length-allCities[a].length);
  let shown=0;
  for(const p of prefs){
    const cities=allCities[p]||[];
    const hitPref=norm(p).includes(q);
    const hitCity=cities.some(c=>norm(c.city).includes(q));
    if(q && !hitPref && !hitCity) continue;
    shown++;
    const btn=document.createElement('button');
    btn.className='card-btn';
    btn.innerHTML='<span class="name">'+escapeHtml(p)+'</span><span class="meta">'+cities.length+' cities</span>';
    btn.onclick=()=>selectPref(p);
    wrap.appendChild(btn);
  }
  document.getElementById('pref-count').textContent=shown+' / '+prefs.length;
}
function selectPref(pref){
  selectedPref=pref; cityFilter='';
  document.getElementById('city-search').value='';
  document.getElementById('city-head-name').textContent=pref;
  document.getElementById('pref-view').style.display='none';
  document.getElementById('city-view').style.display='flex';
  buildCityList();
}
function backToPref(){
  document.getElementById('city-view').style.display='none';
  document.getElementById('pref-view').style.display='flex';
}
function buildCityList(){
  const wrap=document.getElementById('city-list'); wrap.innerHTML='';
  const cities=selectedPref ? (allCities[selectedPref]||[]) : [];
  const q=norm(cityFilter || document.getElementById('global-search').value);
  let shown=0;
  for(const c of cities){
    if(q && !norm(c.city).includes(q) && !norm(c.pref).includes(q)) continue;
    shown++;
    const btn=document.createElement('button');
    btn.className='card-btn city-card';
    btn.innerHTML='<span class="name">'+escapeHtml(c.city)+'</span><span class="meta"><span>3D Tiles</span><span class="lod">LOD '+c.lod+'</span></span>';
    btn.onclick=()=>enterCity(c);
    wrap.appendChild(btn);
  }
  document.getElementById('city-count').textContent=shown+' / '+cities.length;
}
function quickLaunch(prefHint, cityHint){
  const p=Object.keys(allCities).find(x=>norm(x).includes(norm(prefHint))) || Object.keys(allCities).find(x=>(allCities[x]||[]).some(c=>norm(c.city).includes(norm(cityHint))));
  if(!p){ showToast('まだ都市カタログの取得中です'); return; }
  const c=(allCities[p]||[]).find(x=>norm(x.city).includes(norm(cityHint))) || (allCities[p]||[])[0];
  if(c) enterCity(c); else showToast(cityHint+' の3D都市データが見つかりません');
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ============================================================
// 都市に入る
// ============================================================
async function enterCity(c){
  if(!viewer){ showToast('Cesiumがまだ準備できていません'); return; }
  document.getElementById('picker').style.display='none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('load-sub').textContent=c.pref+' '+c.city+' の3D都市モデルを読み込み中...\n初回は数十秒かかることがあります。焦って連打すると、機械も困ります。';
  document.getElementById('place-name').textContent=c.pref+' '+c.city;
  S.flying=false;
  try{
    if(currentTileset){ viewer.scene.primitives.remove(currentTileset); currentTileset=null; }
    const ts=await Cesium.Cesium3DTileset.fromUrl(c.url,{ maximumScreenSpaceError:10, dynamicScreenSpaceError:true, preloadWhenHidden:false });
    currentTileset=ts;
    viewer.scene.primitives.add(ts);
    try{
      ts.style=new Cesium.Cesium3DTileStyle({
        color:{ conditions:[["true","color('white', 0.94)"]] }
      });
    }catch(e){}
    const bs=ts.boundingSphere;
    const carto=Cesium.Cartographic.fromCartesian(bs.center);
    S.lat=Cesium.Math.toDegrees(carto.latitude);
    S.lng=Cesium.Math.toDegrees(carto.longitude);
    S.heading=0; S.pitch=-22;
    await sampleGround(true);
    S.alt=S.groundH+START_REL_ALT;
    S.flying=true;
    document.getElementById('loading').classList.remove('show');
    document.getElementById('controls').style.display='block';
    fetchWeather(S.lat,S.lng);
    applyCamera(); updateHUD(); updateEnvBar();
    if(!S._loopStarted){ S._loopStarted=true; lastT=performance.now(); requestAnimationFrame(loop); }
    showToast(c.city+' から飛行開始');
  }catch(e){
    document.getElementById('load-sub').textContent='読込エラー: '+(e&&e.message?e.message:e)+'\n別の都市を選ぶか、少し待って再試行してください。';
    setTimeout(()=>{ document.getElementById('loading').classList.remove('show'); document.getElementById('picker').style.display='flex'; },2600);
  }
}
function backToPicker(){
  S.flying=false;
  document.getElementById('controls').style.display='none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('city-view').style.display='none';
  document.getElementById('pref-view').style.display='flex';
  document.getElementById('picker').style.display='flex';
}
async function sampleGround(force=false){
  if(!viewer || S.sampling) return;
  const now=performance.now();
  if(!force && now-S.lastGroundSample<900) return;
  S.sampling=true; S.lastGroundSample=now;
  try{
    const res=await Cesium.sampleTerrainMostDetailed(viewer.terrainProvider,[Cesium.Cartographic.fromDegrees(S.lng,S.lat)]);
    const h=(res&&res[0]&&isFinite(res[0].height))?res[0].height:0;
    S.groundH=h;
    if(S.alt<S.groundH+MIN_REL_ALT) S.alt=S.groundH+MIN_REL_ALT;
  }catch(e){} finally{ S.sampling=false; }
}

// ============================================================
// カメラ・飛行ループ
// ============================================================
function applyCamera(){
  if(!viewer) return;
  viewer.camera.setView({
    destination:Cesium.Cartesian3.fromDegrees(S.lng,S.lat,S.alt),
    orientation:{ heading:Cesium.Math.toRadians(S.heading), pitch:Cesium.Math.toRadians(S.pitch), roll:0 }
  });
}
let lastT=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-lastT)/1000); lastT=now;
  if(S.flying){
    const relAlt=Math.max(MIN_REL_ALT,S.alt-S.groundH);
    const altRate=ALT_RATE[S.speedMode]||ALT_RATE.mid;
    if(S.altDir!==0) S.alt=Math.max(S.groundH+MIN_REL_ALT,Math.min(S.groundH+5000,S.alt+S.altDir*altRate*dt));
    S.heading=(S.heading+S.dHeading*92*dt+360)%360;
    S.pitch=Math.max(-82,Math.min(8,S.pitch-S.dPitch*58*dt));
    const mag=Math.min(1,Math.hypot(S.vx,S.vz));
    const mps=(SPEED[S.speedMode]||SPEED.mid)/3.6;
    S.speed=mps*mag;
    if(mag>.015){
      const h=Cesium.Math.toRadians(S.heading);
      const fwd=-S.vz/mag, side=S.vx/mag;
      const north=Math.cos(h)*fwd-Math.sin(h)*side;
      const east=Math.sin(h)*fwd+Math.cos(h)*side;
      const dist=S.speed*dt;
      S.lat+=(north*dist)/111320;
      S.lng+=(east*dist)/(111320*Math.max(.15,Math.cos(Cesium.Math.toRadians(S.lat))));
    }
    applyCamera(); updateHUD();
    if(!S._groundTick || now-S._groundTick>1000){ S._groundTick=now; sampleGround(); }
    if(!S._envTick || now-S._envTick>1000){ S._envTick=now; updateEnvBar(); }
    if(!S._weatherTick || now-S._weatherTick>180000){ S._weatherTick=now; fetchWeather(S.lat,S.lng); }
    if(S.soundOn && AU.gain && AU.lp){
      AU.lp.frequency.value=260+S.speed*3.6*7+Math.min(260,relAlt*.18);
      AU.gain.gain.value=Math.min(.14,.038+S.speed*3.6*.0012);
    }
  }
  requestAnimationFrame(loop);
}
function updateHUD(){
  const rel=Math.max(0,Math.round(S.alt-S.groundH));
  document.getElementById('alt-num').textContent=rel;
  document.getElementById('alt-val2').textContent=rel;
  document.getElementById('spd-num').textContent=Math.round(S.speed*3.6);
  const h=((S.heading%360)+360)%360;
  document.getElementById('compass-dir').textContent=DIRS[Math.round(h/45)%8];
}
function setSpeed(m){
  S.speedMode=m;
  ['slow','mid','fast'].forEach(x=>document.getElementById('spd-'+x).classList.toggle('active',x===m));
  showToast(m==='slow'?'低速モード':m==='mid'?'中速モード':'高速モード');
}

// ============================================================
// 操作系
// ============================================================
function setupButtonHold(el, down, up){
  let active=false;
  const start=e=>{ e.preventDefault(); active=true; down(); };
  const end=e=>{ if(!active) return; e.preventDefault(); active=false; up(); };
  el.addEventListener('pointerdown',start);
  window.addEventListener('pointerup',end);
  window.addEventListener('pointercancel',end);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
setupButtonHold(document.getElementById('alt-up'),()=>S.altDir=1,()=>S.altDir=0);
setupButtonHold(document.getElementById('alt-down'),()=>S.altDir=-1,()=>S.altDir=0);
function setupJoy(padId,knobId,onMove){
  const pad=document.getElementById(padId), knob=document.getElementById(knobId);
  const R=36; let active=false, pointerId=null;
  function move(clientX,clientY){
    const r=pad.getBoundingClientRect();
    let dx=clientX-(r.left+r.width/2), dy=clientY-(r.top+r.height/2);
    const d=Math.hypot(dx,dy);
    if(d>R){ dx=dx/d*R; dy=dy/d*R; }
    knob.style.transform='translate(calc(-50% + '+dx+'px), calc(-50% + '+dy+'px))';
    onMove(dx/R,dy/R);
  }
  function reset(){ knob.style.transform='translate(-50%,-50%)'; onMove(0,0); }
  pad.addEventListener('pointerdown',e=>{ e.preventDefault(); active=true; pointerId=e.pointerId; pad.setPointerCapture(pointerId); move(e.clientX,e.clientY); });
  pad.addEventListener('pointermove',e=>{ if(!active || e.pointerId!==pointerId) return; e.preventDefault(); move(e.clientX,e.clientY); });
  function end(e){ if(!active || e.pointerId!==pointerId) return; active=false; pointerId=null; reset(); }
  pad.addEventListener('pointerup',end); pad.addEventListener('pointercancel',end); pad.addEventListener('lostpointercapture',()=>{ if(active){ active=false; pointerId=null; reset(); } });
}
setupJoy('joy-move','knob-move',(x,y)=>{S.vx=x;S.vz=y;});
setupJoy('joy-look','knob-look',(x,y)=>{S.dHeading=x;S.dPitch=y;});
updateHUD(); updateEnvBar();
</script>
