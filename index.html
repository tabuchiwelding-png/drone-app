<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドローン飛行</title>
<script>const APP_VERSION = '8.0.0';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ===== CSS変数 ===== */
:root {
  --accent: #00ffb4;
  --accent2: #00ccff;
  --dim: rgba(0,255,180,0.35);
  --danger: #ff3b3b;
  --warn: #ffaa00;
  --panel: rgba(4,14,10,0.97);
  --border: rgba(0,255,180,0.18);
  --text: #d0fff0;
  --font: 'Courier New', monospace;
  --tab-h: 56px;
  --joy-size: 96px;
  --knob-size: 32px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:var(--font); color:var(--text); touch-action:none; }
#canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

/* ===== スキャンライン ===== */
#scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px); pointer-events:none; z-index:10; }

/* ===== クロスヘア ===== */
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; pointer-events:none; z-index:20; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:var(--accent); opacity:0.45; }
#crosshair::before { top:50%;left:0;width:100%;height:1px;transform:translateY(-50%); }
#crosshair::after { left:50%;top:0;height:100%;width:1px;transform:translateX(-50%); }
.ch-c { position:absolute;width:10px;height:10px;border-color:var(--accent);border-style:solid;opacity:0.75; }
.tl{top:0;left:0;border-width:2px 0 0 2px}.tr{top:0;right:0;border-width:2px 2px 0 0}
.bl{bottom:0;left:0;border-width:0 0 2px 2px}.br{bottom:0;right:0;border-width:0 2px 2px 0}

/* ===== HUD上部 ===== */
#hud-top { position:fixed; top:0;left:0;right:0; padding:10px 14px 6px; display:flex; justify-content:space-between; z-index:30; background:linear-gradient(to bottom,rgba(0,0,0,0.82),transparent); pointer-events:none; }
.hud-b { display:flex;flex-direction:column;gap:2px; }
.hud-l { font-size:9px;color:var(--dim);letter-spacing:2px; }
.hud-v { font-size:17px;color:var(--accent);font-weight:bold;text-shadow:0 0 10px var(--accent); }
.hud-v.warn{color:var(--warn)}.hud-v.danger{color:var(--danger);animation:blink 0.5s infinite;}

/* ===== コンパス ===== */
#compass { position:fixed; top:58px; left:50%; transform:translateX(-50%); text-align:center; z-index:30; pointer-events:none; }
#compass-dir { font-size:15px;color:var(--accent);display:block;text-shadow:0 0 8px var(--accent); }
#coords-display { font-size:9px;color:var(--dim); }

/* ===== ピッチ表示 ===== */
#pitch-indicator { position:fixed; right:14px; top:50%; transform:translateY(-50%); z-index:30; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:2px; }
.pitch-bar { width:3px; height:60px; background:var(--border); border-radius:2px; position:relative; overflow:visible; }
.pitch-fill { position:absolute; width:3px; background:var(--accent); border-radius:2px; bottom:50%; transition:height 0.1s; }
.pitch-lbl { font-size:8px; color:var(--dim); }
#pitch-val { font-size:10px; color:var(--accent2); }

/* ===== 速度モード ===== */
#speed-mode { position:fixed; top:58px; left:14px; z-index:35; display:flex; flex-direction:column; gap:4px; }
.spd-btn { background:var(--panel); border:1px solid var(--border); color:var(--dim); font-family:var(--font); font-size:9px; padding:5px 10px; cursor:pointer; min-height:44px; }
.spd-btn.active { background:rgba(0,255,180,0.15); border-color:var(--accent); color:var(--accent); }

/* ===== 自動飛行 ===== */
#auto-btn { position:fixed; top:58px; right:52px; z-index:35; background:var(--panel); border:1px solid var(--border); color:var(--accent); font-family:var(--font); font-size:9px; padding:6px 10px; cursor:pointer; min-height:44px; }
#auto-btn.active{background:rgba(0,255,180,0.2);border-color:var(--accent);}

/* ===== 視点リセット ===== */
#view-reset { position:fixed; top:58px; right:14px; z-index:35; background:var(--panel); border:1px solid var(--border); color:var(--accent2); font-family:var(--font); font-size:9px; padding:6px 8px; cursor:pointer; min-height:44px; }

/* ===== データ取得インジケータ ===== */
#fetch-indicator { position:fixed; top:106px; right:14px; z-index:35; font-size:9px; color:var(--accent); opacity:0; transition:opacity 0.3s; pointer-events:none; }
#fetch-indicator.show { opacity:1; }

/* ===== タブバー ===== */
#tabbar { position:fixed; bottom:0;left:0;right:0; height:var(--tab-h); background:rgba(2,8,6,0.97); border-top:1px solid var(--border); display:flex; z-index:100; }
.tab-btn { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:var(--font);font-size:9px;padding-bottom:4px;min-height:44px; }
.tab-btn.active{color:var(--accent);}
.tab-icon{font-size:20px;}

/* ===== パネル ===== */
.panel{position:fixed;bottom:var(--tab-h);left:0;right:0;background:var(--panel);border-top:1px solid var(--border);z-index:50;display:none;overflow-y:auto;max-height:72vh;}
.panel.active{display:block;}
.panel-title{font-size:11px;color:var(--accent);letter-spacing:3px;padding:12px 16px 8px;border-bottom:1px solid var(--border);}
.section-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;padding:10px 16px 6px;}

/* ===== 操作UI ===== */
#fly-controls{position:fixed;bottom:var(--tab-h);left:0;right:0;padding:6px 12px 8px;background:linear-gradient(to top,rgba(0,0,0,0.94),transparent);z-index:40;}
#status-row{display:flex;justify-content:space-between;margin-bottom:6px;padding:4px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.s-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:blink 2s infinite;}
.s-dot.warn{background:var(--warn);}
.s-dot.off{background:#333;box-shadow:none;animation:none;}
.s-lbl{font-size:8px;color:var(--dim);}

/* ===== ジョイスティック ===== */
#ctrl-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;}
.joy-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.joy-lbl{font-size:8px;color:var(--dim);letter-spacing:1px;}
.joy-sub{font-size:7px;color:rgba(0,255,180,0.2);text-align:center;line-height:1.3;}
.joy-base{width:var(--joy-size);height:var(--joy-size);border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.88);position:relative;touch-action:none;}
.joy-ring{position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(0,255,180,0.08);}
.joy-knob{position:absolute;width:var(--knob-size);height:var(--knob-size);border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(0,255,180,0.95),rgba(0,200,140,0.5));border:1.5px solid var(--accent);top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(0,255,180,0.55);pointer-events:none;}
.joy-knob.cam{background:radial-gradient(circle at 35% 35%,rgba(0,204,255,0.95),rgba(0,160,200,0.5));border-color:var(--accent2);box-shadow:0 0 14px rgba(0,204,255,0.55);}

/* ===== 高度・スロットル中央 ===== */
.center-col{display:flex;flex-direction:column;align-items:center;gap:4px;}
.alt-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--border);background:rgba(0,20,15,0.85);color:var(--accent);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;}
.alt-btn:active{background:rgba(0,255,180,0.15);}
.alt-info{display:flex;flex-direction:column;align-items:center;}
.alt-num{font-size:15px;color:var(--accent);font-weight:bold;}
.alt-unit{font-size:8px;color:var(--dim);}

/* ===== 出発地パネル ===== */
#panel-depart{padding:0 0 16px;}
.city-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px;}
.city-btn{background:rgba(0,20,15,0.8);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;padding:10px 4px;cursor:pointer;text-align:center;line-height:1.4;min-height:64px;}
.city-btn.selected{background:rgba(0,255,180,0.15);border-color:var(--accent);color:var(--accent);}
.city-flag{font-size:18px;display:block;}.city-name{font-size:10px;display:block;margin-top:2px;}
.input-row{display:flex;gap:8px;padding:8px 12px 0;}
.addr-input{flex:1;background:rgba(0,20,15,0.9);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:10px 12px;outline:none;}
.addr-input:focus{border-color:var(--accent);}
.addr-input::placeholder{color:var(--dim);font-size:11px;}
.search-btn{background:rgba(0,255,180,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:11px;padding:10px 14px;cursor:pointer;white-space:nowrap;min-height:44px;}
.coord-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 12px 0;}
.fly-start-btn{margin:12px 12px 0;width:calc(100% - 24px);background:linear-gradient(135deg,rgba(0,255,180,0.2),rgba(0,200,140,0.1));border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:13px;letter-spacing:3px;padding:14px;cursor:pointer;text-align:center;min-height:52px;}
.gps-btn{margin:12px 12px 0;width:calc(100% - 24px);background:linear-gradient(135deg,rgba(0,204,255,0.2),rgba(0,160,200,0.1));border:1px solid var(--accent2);color:var(--accent2);font-family:var(--font);font-size:13px;letter-spacing:3px;padding:14px;cursor:pointer;text-align:center;min-height:52px;}

/* ===== ログパネル ===== */
#panel-log{padding:0 0 16px;}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(0,255,180,0.07);}
.log-place{font-size:12px;color:var(--text);}
.log-time{font-size:9px;color:var(--dim);}
.log-fly-btn{background:none;border:1px solid var(--border);color:var(--accent);font-family:var(--font);font-size:9px;padding:6px 12px;cursor:pointer;min-height:44px;}
.log-empty{text-align:center;color:var(--dim);font-size:11px;padding:30px;}

/* ===== ローディング ===== */
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px;}
#loading h2{color:var(--accent);letter-spacing:6px;font-size:16px;text-shadow:0 0 20px var(--accent);}
.load-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-fill{height:100%;background:var(--accent);width:0;transition:width 0.4s ease;}
#loading p{font-size:10px;color:var(--dim);letter-spacing:3px;}
#load-status{font-size:11px;color:var(--accent2);letter-spacing:2px;min-height:18px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== 操作ガイド ===== */
#guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;}
#guide-overlay h3{color:var(--accent);letter-spacing:4px;font-size:13px;}
.guide-row{display:flex;gap:20px;}
.guide-item{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(0,30,20,0.8);border:1px solid var(--border);padding:12px 16px;min-width:130px;}
.guide-icon{font-size:24px;}
.guide-title{font-size:10px;color:var(--accent);letter-spacing:2px;}
.guide-desc{font-size:9px;color:var(--dim);text-align:center;line-height:1.6;}
#guide-close{background:rgba(0,255,180,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--font);font-size:12px;letter-spacing:3px;padding:12px 32px;cursor:pointer;margin-top:6px;}
</style>
</head>
<body>

<!-- ===== ローディング ===== -->
<div id="loading">
  <h2>◈ ドローン飛行</h2>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div id="load-status">GPS取得中...</div>
  <p>実地形データを構築中</p>
</div>

<!-- ===== 操作ガイド ===== -->
<div id="guide-overlay" style="display:none">
  <h3>◈ 操作方法</h3>
  <div class="guide-row">
    <div class="guide-item">
      <span class="guide-icon">🕹️</span>
      <span class="guide-title">左スティック</span>
      <span class="guide-desc">前後左右に<br>移動する</span>
    </div>
    <div class="guide-item">
      <span class="guide-icon">👁️</span>
      <span class="guide-title">右スティック</span>
      <span class="guide-desc">視界・向きを<br>上下左右に回す</span>
    </div>
  </div>
  <div class="guide-row">
    <div class="guide-item">
      <span class="guide-icon">▲▼</span>
      <span class="guide-title">中央ボタン</span>
      <span class="guide-desc">高度を<br>上下に変える</span>
    </div>
    <div class="guide-item">
      <span class="guide-icon">🔄</span>
      <span class="guide-title">視点リセット</span>
      <span class="guide-desc">右上ボタンで<br>正面に戻る</span>
    </div>
  </div>
  <button id="guide-close" onclick="closeGuide()">◈ 飛行開始</button>
</div>

<canvas id="canvas"></canvas>
<div id="scanlines"></div>
<div id="crosshair">
  <div class="ch-c tl"></div><div class="ch-c tr"></div>
  <div class="ch-c bl"></div><div class="ch-c br"></div>
</div>

<!-- ===== HUD ===== -->
<div id="hud-top">
  <div class="hud-b"><span class="hud-l">高度</span><span class="hud-v" id="alt-display">30m</span></div>
  <div class="hud-b" style="align-items:center"><span class="hud-l">◈ ドローン飛行</span><span class="hud-v" style="font-size:11px" id="mode-display">手動</span></div>
  <div class="hud-b" style="align-items:flex-end"><span class="hud-l">速度</span><span class="hud-v" id="spd-display">0 km/h</span><span style="font-size:8px;color:var(--dim)" id="ver-display">v8.0.0</span></div>
</div>
<div id="compass"><span id="compass-dir">北</span><span id="coords-display">--</span></div>

<!-- ===== ピッチ表示 ===== -->
<div id="pitch-indicator">
  <span class="pitch-lbl">仰角</span>
  <div class="pitch-bar"><div class="pitch-fill" id="pitch-fill"></div></div>
  <span id="pitch-val">0°</span>
</div>

<!-- ===== データ取得インジケータ ===== -->
<div id="fetch-indicator">◈ データ更新中</div>

<!-- ===== 速度モード ===== -->
<div id="speed-mode">
  <button class="spd-btn active" id="spd-slow" onclick="setSpeed('slow')">低速</button>
  <button class="spd-btn" id="spd-mid" onclick="setSpeed('mid')">中速</button>
  <button class="spd-btn" id="spd-fast" onclick="setSpeed('fast')">高速</button>
</div>

<button id="auto-btn" onclick="toggleAuto()">自動飛行</button>
<button id="view-reset" onclick="resetView()" title="視点リセット">👁</button>

<!-- ===== 操作コントロール ===== -->
<div id="fly-controls">
  <div id="status-row">
    <div class="s-item"><div class="s-dot" id="gps-dot"></div><span class="s-lbl">GPS</span></div>
    <div class="s-item"><div class="s-dot" id="data-dot"></div><span class="s-lbl">データ</span></div>
    <div class="s-item"><div class="s-dot" id="bat-dot"></div><span class="s-lbl" id="bat-lbl">電池100%</span></div>
    <div class="s-item"><div class="s-dot"></div><span class="s-lbl" id="city-lbl">--</span></div>
  </div>
  <div id="ctrl-row">
    <div class="joy-wrap">
      <span class="joy-lbl">移動</span>
      <div class="joy-base" id="joy-move"><div class="joy-ring"></div><div class="joy-knob" id="knob-move"></div></div>
      <span class="joy-sub">前後/左右</span>
    </div>
    <div class="center-col">
      <button class="alt-btn" id="btn-up">▲</button>
      <div class="alt-info"><span class="alt-num" id="alt-num">30</span><span class="alt-unit">メートル</span></div>
      <button class="alt-btn" id="btn-down">▼</button>
    </div>
    <div class="joy-wrap">
      <span class="joy-lbl" style="color:var(--accent2)">視界</span>
      <div class="joy-base" id="joy-cam"><div class="joy-ring"></div><div class="joy-knob cam" id="knob-cam"></div></div>
      <span class="joy-sub">上下/左右</span>
    </div>
  </div>
</div>

<!-- ===== 出発地パネル ===== -->
<div class="panel" id="panel-depart">
  <div class="panel-title">◈ 出発地を選ぶ</div>
  <button class="gps-btn" onclick="useCurrentLocation()">📍 現在地から飛ぶ</button>
  <div class="section-lbl" style="margin-top:8px">▸ 人気の都市</div>
  <div class="city-grid">
    <button class="city-btn" onclick="flyTo(35.6895,139.6917,'東京',this)"><span class="city-flag">🗼</span><span class="city-name">東京</span></button>
    <button class="city-btn" onclick="flyTo(34.6937,135.5023,'大阪',this)"><span class="city-flag">🏯</span><span class="city-name">大阪</span></button>
    <button class="city-btn" onclick="flyTo(35.0116,135.7681,'京都',this)"><span class="city-flag">⛩️</span><span class="city-name">京都</span></button>
    <button class="city-btn" onclick="flyTo(26.2124,127.6809,'沖縄',this)"><span class="city-flag">🌊</span><span class="city-name">沖縄</span></button>
    <button class="city-btn" onclick="flyTo(43.0642,141.3469,'札幌',this)"><span class="city-flag">❄️</span><span class="city-name">札幌</span></button>
    <button class="city-btn" onclick="flyTo(39.7036,141.1527,'盛岡',this)"><span class="city-flag">🏔️</span><span class="city-name">盛岡</span></button>
    <button class="city-btn" onclick="flyTo(33.5904,130.4017,'福岡',this)"><span class="city-flag">🎋</span><span class="city-name">福岡</span></button>
    <button class="city-btn" onclick="flyTo(35.3606,138.7274,'富士山',this)"><span class="city-flag">🗻</span><span class="city-name">富士山</span></button>
    <button class="city-btn" onclick="flyTo(40.7128,-74.006,'NY',this)"><span class="city-flag">🗽</span><span class="city-name">NY</span></button>
    <button class="city-btn" onclick="flyTo(48.8566,2.3522,'パリ',this)"><span class="city-flag">🇫🇷</span><span class="city-name">パリ</span></button>
    <button class="city-btn" onclick="flyTo(25.2048,55.2708,'ドバイ',this)"><span class="city-flag">🌆</span><span class="city-name">ドバイ</span></button>
    <button class="city-btn" onclick="flyTo(51.5074,-0.1278,'ロンドン',this)"><span class="city-flag">🎡</span><span class="city-name">ロンドン</span></button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 住所・場所で検索</div>
  <div class="input-row">
    <input class="addr-input" id="addr-input" type="text" placeholder="例：渋谷スクランブル交差点..."/>
    <button class="search-btn" onclick="searchAddress()">検索</button>
  </div>
  <div class="section-lbl" style="margin-top:8px">▸ 座標で指定</div>
  <div class="coord-row">
    <input class="addr-input" id="lat-input" type="number" placeholder="緯度 35.6762" step="0.0001"/>
    <input class="addr-input" id="lng-input" type="number" placeholder="経度 139.6503" step="0.0001"/>
  </div>
  <div class="input-row" style="margin-top:0"><button class="search-btn" style="flex:1" onclick="flyToCoords()">この座標へ移動</button></div>
  <button class="fly-start-btn" onclick="startFlight()">◈ 飛行開始</button>
</div>

<!-- ===== ログパネル ===== -->
<div class="panel" id="panel-log">
  <div class="panel-title">◈ 飛行記録</div>
  <div id="log-list"><div class="log-empty">まだ記録がありません</div></div>
</div>

<!-- ===== タブバー ===== -->
<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('fly')"><span class="tab-icon">🚁</span>飛行</button>
  <button class="tab-btn" onclick="switchTab('depart')"><span class="tab-icon">📍</span>出発地</button>
  <button class="tab-btn" onclick="switchTab('log')"><span class="tab-icon">📋</span>記録</button>
</div>

<script>
// ===== 定数 =====
const DIRS = ['北','北東','東','南東','南','南西','西','北西'];
const SPEED_MAP = { slow:12, mid:50, fast:200 };
const MIN_ALT = 3;
const MAX_ALT = 2000;
const CAM_PITCH_MIN = -80;
const CAM_PITCH_MAX = 60;
const JOY_R = 32;
const FETCH_RADIUS = 600;       // Overpass取得半径(m)
const REFETCH_DIST = 200;       // 再取得トリガー距離(m)
const METERS_PER_DEG_LAT = 111320;

// ===== 状態 =====
const S = {
  lat: 35.6895, lng: 139.6917, alt: 60,
  heading: 0,
  camPitch: -8,
  speed: 0, speedMode: 'slow',
  autoFly: false, autoAngle: 0,
  battery: 100,
  moveActive: false, moveDx: 0, moveDy: 0,
  camActive: false, camDx: 0, camDy: 0,
  altDir: 0,
  log: [], currentCity: '--',
  gpsOk: false,
  // 最後にデータ取得した座標
  lastFetchLat: null, lastFetchLng: null,
  isFetching: false,
};

// ===== Three.js セットアップ =====
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xb8daf8, 0.00025);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 5000);
camera.rotation.order = 'YXZ';

// ===== 照明 =====
scene.add(new THREE.AmbientLight(0xb0ccff, 0.9));
const sun = new THREE.DirectionalLight(0xfff8e8, 1.2);
sun.position.set(400, 900, 300);
scene.add(sun);

// ===== ワールドグループ（座標変換用） =====
const world = new THREE.Group();
scene.add(world);

// ===== 地面 =====
const groundGeo = new THREE.PlaneGeometry(6000, 6000);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a7c3f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
world.add(ground);

// ===== 座標変換ユーティリティ =====
// lat/lng → world座標(x,z)  originはS.lat,S.lng基準
function latLngToXZ(lat, lng, originLat, originLng) {
  const metersPerDegLng = METERS_PER_DEG_LAT * Math.cos(originLat * Math.PI / 180);
  const x = (lng - originLng) * metersPerDegLng;
  const z = -(lat - originLat) * METERS_PER_DEG_LAT;
  return { x, z };
}

// ===== 建物マテリアルキャッシュ =====
function makeFacadeTex(type) {
  const sz = 256;
  const cv = document.createElement('canvas');
  cv.width = sz; cv.height = sz;
  const ctx = cv.getContext('2d');
  if (type === 'office') {
    ctx.fillStyle = '#1a2a3a'; ctx.fillRect(0,0,sz,sz);
    ctx.fillStyle = '#0d1520';
    for (let x=0;x<sz;x+=32) ctx.fillRect(x,0,3,sz);
    for (let y=0;y<sz;y+=24) ctx.fillRect(0,y,sz,3);
    for (let col=0;col<7;col++) for (let row=0;row<9;row++) {
      const lit=Math.random();
      ctx.fillStyle = lit<0.55 ? `rgb(${200+Math.random()*55|0},${220+Math.random()*35|0},${180+Math.random()*75|0})` : lit<0.75 ? '#aabbcc' : '#0e1c2b';
      ctx.fillRect(col*32+5, row*24+5, 22, 14);
    }
  } else if (type === 'residential') {
    ctx.fillStyle = `hsl(${30+Math.random()*20|0},${15+Math.random()*15|0}%,${62+Math.random()*12|0}%)`;
    ctx.fillRect(0,0,sz,sz);
    ctx.fillStyle='rgba(0,0,0,0.12)';
    for (let y=0;y<sz;y+=36) ctx.fillRect(0,y+32,sz,4);
    for (let col=0;col<5;col++) for (let row=0;row<6;row++) {
      const wx=col*46+10, wy=row*36+8;
      ctx.fillStyle=Math.random()<0.4?'#ffe8a0':Math.random()<0.6?'#b0c8e0':'#445';
      ctx.fillRect(wx,wy,26,20);
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.fillRect(wx+12,wy,2,20); ctx.fillRect(wx,wy+10,26,2);
    }
  } else {
    ctx.fillStyle=`hsl(${200+Math.random()*40|0},20%,55%)`; ctx.fillRect(0,0,sz,sz);
    ctx.fillStyle='rgba(180,220,255,0.55)'; ctx.fillRect(20,40,sz-40,80);
    ctx.fillStyle='rgba(180,220,255,0.4)'; ctx.fillRect(20,150,sz-40,60);
  }
  const tex = new THREE.CanvasTexture(cv);
  return tex;
}

const matCache = {};
function getBuildingMats(type, baseColor) {
  const key = type + '_' + baseColor;
  if (matCache[key]) return matCache[key];
  const tex = makeFacadeTex(type);
  const roofColor = type==='office' ? 0x1a2530 : type==='residential' ? 0x888070 : 0x607080;
  const mats = [
    new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),
    new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),
    new THREE.MeshLambertMaterial({ color: roofColor }),
    new THREE.MeshLambertMaterial({ color: 0x111111 }),
    new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),
    new THREE.MeshLambertMaterial({ map: tex, color: baseColor }),
  ];
  matCache[key] = mats;
  return mats;
}

// ===== ビルオブジェクト管理 =====
const buildingGroup = new THREE.Group();
world.add(buildingGroup);
const roadGroup = new THREE.Group();
world.add(roadGroup);
const waterGroup = new THREE.Group();
world.add(waterGroup);

// ===== フォールバック用ランダム建物 =====
function buildFallbackCity(originLat, originLng) {
  clearBuildings();
  const rand = (a,b)=>a+Math.random()*(b-a);
  for (let bx=-1200; bx<=1200; bx+=80) {
    for (let bz=-1200; bz<=1200; bz+=80) {
      if (Math.random()<0.55) {
        const r=Math.random();
        let type,h,w,d;
        if (r<0.3){type='office';w=rand(20,45);d=rand(20,45);h=rand(30,120);}
        else if (r<0.72){type='residential';w=rand(15,35);d=rand(15,35);h=rand(10,50);}
        else{type='low';w=rand(18,50);d=rand(18,50);h=rand(4,15);}
        const baseColors={office:[0x1e3248,0x2a3f52],residential:[0xc8b89a,0xd4c4a8],low:[0x7a8fa0,0x8fa0b0]};
        const pal=baseColors[type];
        const bc=pal[Math.floor(Math.random()*pal.length)];
        const cx=bx+rand(-30,30), cz=bz+rand(-30,30);
        const geo=new THREE.BoxGeometry(w,h,d);
        const mesh=new THREE.Mesh(geo, getBuildingMats(type,bc));
        mesh.position.set(cx,h/2,cz);
        buildingGroup.add(mesh);
      }
    }
  }
}

// ===== Overpass APIから実建物データ取得 =====
async function fetchBuildings(lat, lng) {
  if (S.isFetching) return;
  S.isFetching = true;
  showFetchIndicator(true);
  document.getElementById('data-dot').className = 's-dot warn';

  const query = `[out:json][timeout:25];
(
  way["building"](around:${FETCH_RADIUS},${lat},${lng});
  way["landuse"="water"](around:${FETCH_RADIUS},${lat},${lng});
  way["waterway"](around:${FETCH_RADIUS},${lat},${lng});
  way["highway"](around:${FETCH_RADIUS},${lat},${lng});
);
out body;
>;
out skel qt;`;

  const HOSTS = [
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter',
  ];

  let data = null;
  for (const host of HOSTS) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 20000);
      const res = await fetch(host, {
        method: 'POST',
        body: query,
        signal: ctrl.signal,
      });
      clearTimeout(tid);
      if (res.ok) { data = await res.json(); break; }
    } catch(e) { /* 次のホストへ */ }
  }

  if (!data) {
    // フォールバック
    buildFallbackCity(lat, lng);
    S.isFetching = false;
    showFetchIndicator(false);
    document.getElementById('data-dot').className = 's-dot warn';
    return;
  }

  // ノードマップ構築
  const nodes = {};
  for (const el of data.elements) {
    if (el.type === 'node') nodes[el.id] = { lat: el.lat, lng: el.lon };
  }

  clearBuildings();

  for (const el of data.elements) {
    if (el.type !== 'way' || !el.nodes) continue;
    const tags = el.tags || {};

    if (tags.building) {
      buildOsmBuilding(el, nodes, lat, lng, tags);
    } else if (tags.landuse === 'water' || tags.waterway) {
      buildOsmWater(el, nodes, lat, lng);
    } else if (tags.highway) {
      buildOsmRoad(el, nodes, lat, lng, tags.highway);
    }
  }

  S.lastFetchLat = lat;
  S.lastFetchLng = lng;
  S.isFetching = false;
  showFetchIndicator(false);
  document.getElementById('data-dot').className = 's-dot';
}

// ===== OSM建物をThree.jsに変換 =====
function buildOsmBuilding(way, nodes, originLat, originLng, tags) {
  const pts = [];
  for (const nid of way.nodes) {
    const n = nodes[nid];
    if (!n) continue;
    const pos = latLngToXZ(n.lat, n.lng, originLat, originLng);
    pts.push(new THREE.Vector2(pos.x, pos.z));
  }
  if (pts.length < 3) return;

  // 高さ推定
  let h = 10;
  if (tags['height']) h = Math.max(3, parseFloat(tags['height']) || 10);
  else if (tags['building:levels']) h = Math.max(3, (parseFloat(tags['building:levels']) || 3) * 3.2);
  else {
    const bt = tags['building'];
    if (bt === 'apartments' || bt === 'residential') h = 12 + Math.random() * 20;
    else if (bt === 'commercial' || bt === 'office' || bt === 'retail') h = 15 + Math.random() * 40;
    else if (bt === 'industrial' || bt === 'warehouse') h = 8 + Math.random() * 8;
    else if (bt === 'house' || bt === 'detached') h = 6 + Math.random() * 4;
    else h = 8 + Math.random() * 15;
  }
  h = Math.min(h, 300);

  // 建物タイプ判定
  const bt = tags['building'] || '';
  let type = 'residential';
  if (['office','commercial','retail','supermarket','mall'].includes(bt)) type = 'office';
  else if (['industrial','warehouse','factory'].includes(bt)) type = 'low';

  const baseColors = {
    office: [0x1e3248, 0x2a3f52, 0x304050],
    residential: [0xc8b89a, 0xd4c4a8, 0xbfb090],
    low: [0x7a8fa0, 0x8fa0b0, 0x607080],
  };
  const pal = baseColors[type];
  const bc = pal[Math.floor(Math.random() * pal.length)];

  try {
    const shape = new THREE.Shape(pts);
    const extGeo = new THREE.ExtrudeGeometry(shape, {
      depth: h,
      bevelEnabled: false,
    });
    // ExtrudeはXY平面→回転してXZ平面に
    extGeo.rotateX(-Math.PI / 2);

    const mesh = new THREE.Mesh(extGeo, getBuildingMats(type, bc));
    mesh.position.y = 0;
    buildingGroup.add(mesh);

    // 屋上縁
    const rimShape = new THREE.Shape(pts);
    const rimGeo = new THREE.ExtrudeGeometry(rimShape, { depth: 0.8, bevelEnabled: false });
    rimGeo.rotateX(-Math.PI / 2);
    const rimMat = new THREE.MeshLambertMaterial({ color: type==='office' ? 0x1a2530 : 0x888070 });
    const rim = new THREE.Mesh(rimGeo, rimMat);
    rim.position.y = h;
    buildingGroup.add(rim);
  } catch(e) { /* 形状が複雑すぎる場合はスキップ */ }
}

// ===== OSM水面 =====
function buildOsmWater(way, nodes, originLat, originLng) {
  const pts = [];
  for (const nid of way.nodes) {
    const n = nodes[nid];
    if (!n) continue;
    const pos = latLngToXZ(n.lat, n.lng, originLat, originLng);
    pts.push(new THREE.Vector2(pos.x, pos.z));
  }
  if (pts.length < 3) return;
  try {
    const shape = new THREE.Shape(pts);
    const geo = new THREE.ShapeGeometry(shape);
    geo.rotateX(-Math.PI / 2);
    const mat = new THREE.MeshLambertMaterial({ color: 0x1a6896, transparent: true, opacity: 0.75 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.2;
    waterGroup.add(mesh);
  } catch(e) {}
}

// ===== OSM道路 =====
function buildOsmRoad(way, nodes, originLat, originLng, highway) {
  const widths = { motorway:14, trunk:12, primary:10, secondary:8, tertiary:6, residential:5, service:4, footway:2, path:1.5, cycleway:2 };
  const w = widths[highway] || 4;
  const roadColor = highway === 'footway' || highway === 'path' ? 0x887766 : 0x4a4a4a;
  const pts3 = [];
  for (const nid of way.nodes) {
    const n = nodes[nid];
    if (!n) continue;
    const pos = latLngToXZ(n.lat, n.lng, originLat, originLng);
    pts3.push(new THREE.Vector3(pos.x, 0.05, pos.z));
  }
  if (pts3.length < 2) return;
  for (let i = 0; i < pts3.length - 1; i++) {
    const a = pts3[i], b = pts3[i+1];
    const dx = b.x-a.x, dz = b.z-a.z;
    const len = Math.sqrt(dx*dx+dz*dz);
    if (len < 0.1) continue;
    const geo = new THREE.PlaneGeometry(len, w);
    const mat = new THREE.MeshLambertMaterial({ color: roadColor });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI/2;
    mesh.position.set((a.x+b.x)/2, 0.05, (a.z+b.z)/2);
    mesh.rotation.z = Math.atan2(dz, dx);
    roadGroup.add(mesh);
  }
}

// ===== 建物クリア =====
function clearBuildings() {
  while (buildingGroup.children.length) {
    const m = buildingGroup.children[0];
    if (m.geometry) m.geometry.dispose();
    buildingGroup.remove(m);
  }
  while (roadGroup.children.length) {
    const m = roadGroup.children[0];
    if (m.geometry) m.geometry.dispose();
    roadGroup.remove(m);
  }
  while (waterGroup.children.length) {
    const m = waterGroup.children[0];
    if (m.geometry) m.geometry.dispose();
    waterGroup.remove(m);
  }
}

// ===== 移動時の差分更新チェック =====
function checkRefetch() {
  if (S.isFetching) return;
  if (S.lastFetchLat === null) return;
  const metersPerDegLng = METERS_PER_DEG_LAT * Math.cos(S.lat * Math.PI / 180);
  const dlat = (S.lat - S.lastFetchLat) * METERS_PER_DEG_LAT;
  const dlng = (S.lng - S.lastFetchLng) * metersPerDegLng;
  const dist = Math.sqrt(dlat*dlat + dlng*dlng);
  if (dist > REFETCH_DIST) {
    fetchBuildings(S.lat, S.lng);
  }
}

// ===== インジケータ =====
function showFetchIndicator(show) {
  document.getElementById('fetch-indicator').classList.toggle('show', show);
}

// ===== カメラ更新 =====
function updateCamera() {
  camera.position.set(0, S.alt, 0);
  camera.rotation.y = -S.heading * Math.PI / 180;
  camera.rotation.x = S.camPitch * Math.PI / 180;
}

// ===== メインループ =====
let lastTime = 0;
function mainLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (S.autoFly) {
    S.autoAngle += dt * 0.5;
    S.heading = (S.heading + dt * 18) % 360;
    S.speed = 35;
    S.alt = Math.max(MIN_ALT, 60 + Math.sin(S.autoAngle) * 20);
    const headRad = S.heading * Math.PI / 180;
    const mv = 0.45;
    world.position.x += Math.sin(headRad) * mv;
    world.position.z += Math.cos(headRad) * mv;
    const metersPerDegLng = METERS_PER_DEG_LAT * Math.cos(S.lat * Math.PI / 180);
    S.lat += Math.cos(headRad) * mv / METERS_PER_DEG_LAT;
    S.lng += Math.sin(headRad) * mv / metersPerDegLng;
  } else {
    if (S.moveActive) {
      const spd = SPEED_MAP[S.speedMode];
      const headRad = S.heading * Math.PI / 180;
      const fwd = -S.moveDy, str = S.moveDx;
      const mv = spd * dt;
      const mag = Math.min(1, Math.sqrt(S.moveDx**2 + S.moveDy**2));
      const wx = (Math.sin(headRad)*fwd + Math.cos(headRad)*str) * mv;
      const wz = (Math.cos(headRad)*fwd - Math.sin(headRad)*str) * mv;
      world.position.x += wx;
      world.position.z += wz;
      // 座標更新
      const metersPerDegLng = METERS_PER_DEG_LAT * Math.cos(S.lat * Math.PI / 180);
      S.lat -= wz / METERS_PER_DEG_LAT;
      S.lng += wx / metersPerDegLng;
      S.speed = Math.round(spd * mag * 3.6 * 0.1);
    } else {
      S.speed = Math.max(0, S.speed - 2);
    }
    if (S.camActive) {
      S.heading = (S.heading + S.camDx * 2.0 + 360) % 360;
      S.camPitch = Math.max(CAM_PITCH_MIN, Math.min(CAM_PITCH_MAX, S.camPitch - S.camDy * 1.8));
    }
  }

  if (S.altDir !== 0) {
    const altSpd = S.speedMode==='fast' ? 8 : S.speedMode==='mid' ? 4 : 2;
    S.alt = Math.max(MIN_ALT, Math.min(MAX_ALT, S.alt + S.altDir * altSpd));
  }

  updateCamera();
  updateHUD();
  checkRefetch();
}

// ===== HUD更新 =====
function updateHUD() {
  const altEl = document.getElementById('alt-display');
  altEl.textContent = Math.round(S.alt) + 'm';
  altEl.className = 'hud-v' + (S.alt<5?' danger':S.alt<15?' warn':'');
  document.getElementById('spd-display').textContent = Math.round(S.speed) + ' km/h';
  document.getElementById('alt-num').textContent = Math.round(S.alt);
  document.getElementById('coords-display').textContent = S.lat.toFixed(4)+'°N '+S.lng.toFixed(4)+'°E';
  document.getElementById('mode-display').textContent = S.autoFly ? '自動飛行' : '手動';
  const di = Math.round(((S.heading%360)+360)%360/45)%8;
  document.getElementById('compass-dir').textContent = DIRS[di];
  const pct = Math.max(0,Math.min(100,(S.camPitch-CAM_PITCH_MIN)/(CAM_PITCH_MAX-CAM_PITCH_MIN)*100));
  document.getElementById('pitch-fill').style.height = pct+'%';
  document.getElementById('pitch-val').textContent = Math.round(S.camPitch)+'°';
}

// ===== レンダーループ =====
function animate(ts) {
  requestAnimationFrame(animate);
  mainLoop(ts);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// ===== ジョイスティック =====
function setupJoy(baseId, knobId, onMove, onEnd) {
  const base = document.getElementById(baseId);
  const knob = document.getElementById(knobId);
  let sx=0, sy=0, touchId=null;
  function applyMove(rawDx, rawDy) {
    const dist=Math.sqrt(rawDx*rawDx+rawDy*rawDy);
    let dx=rawDx, dy=rawDy;
    if(dist>JOY_R){dx=rawDx/dist*JOY_R;dy=rawDy/dist*JOY_R;}
    onMove(dx/JOY_R, dy/JOY_R);
    knob.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
  base.addEventListener('touchstart', e=>{
    e.preventDefault(); if(touchId!==null)return;
    const t=e.changedTouches[0]; touchId=t.identifier;
    const r=base.getBoundingClientRect(); sx=r.left+r.width/2; sy=r.top+r.height/2;
    applyMove(t.clientX-sx, t.clientY-sy);
  },{passive:false});
  base.addEventListener('touchmove', e=>{
    e.preventDefault();
    for(const t of e.changedTouches){if(t.identifier===touchId){applyMove(t.clientX-sx,t.clientY-sy);break;}}
  },{passive:false});
  function onTouchEnd(e){
    for(const t of e.changedTouches){if(t.identifier===touchId){touchId=null;onEnd();knob.style.transform='translate(-50%,-50%)';break;}}
  }
  base.addEventListener('touchend',onTouchEnd);
  base.addEventListener('touchcancel',onTouchEnd);
  let mouseDown=false;
  base.addEventListener('mousedown',e=>{
    mouseDown=true; const r=base.getBoundingClientRect(); sx=r.left+r.width/2; sy=r.top+r.height/2;
    applyMove(e.clientX-sx,e.clientY-sy);
  });
  base.addEventListener('mousemove',e=>{if(!mouseDown)return;applyMove(e.clientX-sx,e.clientY-sy);});
  const stopMouse=()=>{if(mouseDown){mouseDown=false;onEnd();knob.style.transform='translate(-50%,-50%)';}};
  base.addEventListener('mouseup',stopMouse);
  base.addEventListener('mouseleave',stopMouse);
}

setupJoy('joy-move','knob-move',
  (dx,dy)=>{S.moveActive=true;S.moveDx=dx;S.moveDy=dy;},
  ()=>{S.moveActive=false;S.moveDx=0;S.moveDy=0;}
);
setupJoy('joy-cam','knob-cam',
  (dx,dy)=>{S.camActive=true;S.camDx=dx;S.camDy=dy;},
  ()=>{S.camActive=false;S.camDx=0;S.camDy=0;}
);

// ===== 高度ボタン =====
const btnUp=document.getElementById('btn-up');
const btnDn=document.getElementById('btn-down');
btnUp.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=1;},{passive:false});
btnDn.addEventListener('touchstart',e=>{e.preventDefault();S.altDir=-1;},{passive:false});
btnUp.addEventListener('touchend',()=>S.altDir=0);
btnDn.addEventListener('touchend',()=>S.altDir=0);
btnUp.addEventListener('mousedown',()=>S.altDir=1);
btnDn.addEventListener('mousedown',()=>S.altDir=-1);
window.addEventListener('mouseup',()=>S.altDir=0);

// ===== バッテリー =====
setInterval(()=>{
  S.battery=Math.max(0,S.battery-0.04);
  const p=Math.round(S.battery);
  document.getElementById('bat-lbl').textContent='電池'+p+'%';
  document.getElementById('bat-dot').className='s-dot'+(p<20?' warn':'');
},3000);

// ===== UI関数 =====
function setSpeed(m){
  S.speedMode=m;
  ['slow','mid','fast'].forEach(x=>document.getElementById('spd-'+x).classList.toggle('active',x===m));
}
function toggleAuto(){
  S.autoFly=!S.autoFly;
  const b=document.getElementById('auto-btn');
  b.textContent=S.autoFly?'■ 停止':'自動飛行';
  b.classList.toggle('active',S.autoFly);
}
function resetView(){ S.camPitch=-8; }
function closeGuide(){ document.getElementById('guide-overlay').style.display='none'; }

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['fly','depart','log'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const show=tab==='fly';
  document.getElementById('fly-controls').style.display=show?'block':'none';
  document.getElementById('auto-btn').style.display=show?'block':'none';
  document.getElementById('speed-mode').style.display=show?'flex':'none';
  document.getElementById('view-reset').style.display=show?'block':'none';
  if(tab==='depart') document.getElementById('panel-depart').classList.add('active');
  if(tab==='log') document.getElementById('panel-log').classList.add('active');
}

// ===== flyTo：座標移動 + データ取得 =====
function flyTo(lat, lng, name, btn) {
  S.lat=lat; S.lng=lng; S.currentCity=name; S.alt=60; S.speed=0; S.camPitch=-8;
  // ワールドをリセット
  world.position.set(0,0,0);
  S.lastFetchLat=null;
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('selected'));
  if(btn) btn.classList.add('selected');
  document.getElementById('city-lbl').textContent=name;
  fetchBuildings(lat, lng);
}

function useCurrentLocation() {
  if(!navigator.geolocation){ alert('位置情報が利用できません'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    flyTo(pos.coords.latitude, pos.coords.longitude, '現在地', null);
    switchTab('fly');
  }, ()=>{ alert('位置情報の取得に失敗しました'); });
}

async function searchAddress() {
  const q=document.getElementById('addr-input').value.trim();
  if(!q) return;
  try {
    const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1');
    const data=await res.json();
    if(data.length>0){ flyTo(parseFloat(data[0].lat),parseFloat(data[0].lon),q,null); alert('「'+q+'」が見つかりました！飛行開始を押してください。'); }
    else alert('場所が見つかりませんでした。');
  } catch(e){ alert('検索エラーが発生しました。'); }
}

function flyToCoords(){
  const lat=parseFloat(document.getElementById('lat-input').value);
  const lng=parseFloat(document.getElementById('lng-input').value);
  if(isNaN(lat)||isNaN(lng)){ alert('緯度・経度を正しく入力してください'); return; }
  flyTo(lat,lng,lat.toFixed(3)+','+lng.toFixed(3),null);
}

function startFlight(){
  S.log.unshift({ place:S.currentCity, lat:S.lat, lng:S.lng, time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) });
  if(S.log.length>50) S.log.length=50;
  renderLog();
  switchTab('fly');
}

function renderLog(){
  const el=document.getElementById('log-list');
  if(!S.log.length){ el.innerHTML='<div class="log-empty">まだ記録がありません</div>'; return; }
  el.innerHTML=S.log.slice(0,20).map(e=>
    `<div class="log-item"><div><div class="log-place">📍 ${e.place}</div><div class="log-time">${e.time}</div></div><button class="log-fly-btn" onclick="flyTo(${e.lat},${e.lng},'${e.place}',null);switchTab('fly')">再訪</button></div>`
  ).join('');
}

// ===== ローディング進捗 =====
function setLoadProgress(pct, msg) {
  document.getElementById('load-fill').style.width = pct+'%';
  document.getElementById('load-status').textContent = msg;
}

// ===== 起動シーケンス =====
async function init() {
  document.getElementById('ver-display').textContent = 'v'+APP_VERSION;
  updateCamera();
  requestAnimationFrame(animate);

  setLoadProgress(10, 'GPS取得中...');

  // GPS取得
  let initLat = 35.6895, initLng = 139.6917, initName = '東京';
  try {
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('no geo')); return; }
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000, maximumAge: 60000 });
    });
    initLat = pos.coords.latitude;
    initLng = pos.coords.longitude;
    initName = '現在地';
    S.gpsOk = true;
    document.getElementById('gps-dot').className = 's-dot';
    setLoadProgress(40, 'GPS取得完了');
  } catch(e) {
    document.getElementById('gps-dot').className = 's-dot warn';
    setLoadProgress(40, 'GPS取得失敗（東京で開始）');
    await new Promise(r => setTimeout(r, 800));
  }

  S.lat = initLat; S.lng = initLng; S.currentCity = initName;
  document.getElementById('city-lbl').textContent = initName;
  document.getElementById('coords-display').textContent = initLat.toFixed(4)+'°N '+initLng.toFixed(4)+'°E';

  setLoadProgress(55, '建物データ取得中...');

  // 建物データ取得
  await fetchBuildings(initLat, initLng);

  setLoadProgress(100, '完了');
  await new Promise(r => setTimeout(r, 400));

  document.getElementById('loading').style.display = 'none';
  document.getElementById('guide-overlay').style.display = 'flex';
}

init();

// ===== visibilitychange（iOSキャッシュ対策） =====
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    const saved = localStorage.getItem('drone_version_v1');
    if (saved && saved !== APP_VERSION) window.location.reload(true);
    localStorage.setItem('drone_version_v1', APP_VERSION);
  }
});
localStorage.setItem('drone_version_v1', APP_VERSION);
</script>
