<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PLATEAU テスト</title>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.117/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0a0e14;font-family:-apple-system,system-ui,sans-serif;}
  #cesiumContainer{position:absolute;inset:0;}
  .cesium-viewer-bottom,.cesium-viewer-animationContainer,.cesium-viewer-timelineContainer,
  .cesium-viewer-toolbar,.cesium-viewer-fullscreenContainer,.cesium-viewer-geocoderContainer{display:none!important;}
  #status{position:fixed;top:env(safe-area-inset-top,10px);left:10px;right:10px;z-index:999;
    background:rgba(8,16,22,0.85);color:#2effc6;font-size:13px;line-height:1.7;padding:10px 14px;
    border:1px solid rgba(120,220,200,0.3);border-radius:10px;white-space:pre-wrap;backdrop-filter:blur(8px);}
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<div id="status">起動中...</div>
<script>
const log = (m) => { document.getElementById('status').textContent = m; };
try {
  if (typeof Cesium === 'undefined') { log('❌ Cesium本体の読み込み失敗'); }
  else {
    log('Cesium読込OK。地球を生成中...');
    // ionトークン不要：背景はOSM、地形なし
    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: Cesium.ImageryLayer.fromProviderAsync(
        Promise.resolve(new Cesium.OpenStreetMapImageryProvider({ url: 'https://tile.openstreetmap.org/' })), {}),
      baseLayerPicker: false, geocoder: false, homeButton: false, sceneModePicker: false,
      navigationHelpButton: false, animation: false, timeline: false,
      fullscreenButton: false, infoBox: false, selectionIndicator: false,
    });
    log('地球OK。PLATEAU千代田区の実建物を読込中...\n（初回は数十秒かかることがあります）');

    // PLATEAU公式チュートリアル掲載の確実なURL（千代田区 建築物 LOD1）
    Cesium.Cesium3DTileset.fromUrl(
      'https://assets.cms.plateau.reearth.io/assets/0e/e5948a-e95c-4e31-be85-1f8c066ed996/13101_chiyoda-ku_pref_2023_citygml_1_op_bldg_3dtiles_13101_chiyoda-ku_lod1/tileset.json'
    ).then((tileset) => {
      viewer.scene.primitives.add(tileset);
      log('✅ PLATEAU千代田区の実建物を表示\n本物の建物形状です\n指でドラッグ＝回転 / ピンチ＝ズーム');
      // 建物にカメラを寄せる
      viewer.flyTo(tileset, {
        offset: new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-35), 3000),
        duration: 3
      });
    }).catch((e) => {
      log('❌ 建物読込エラー: ' + (e && e.message ? e.message : e));
    });

    // 念のため初期カメラを東京（千代田区）上空へ
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(139.753, 35.685, 6000.0)
    });
  }
} catch (e) {
  log('❌ エラー: ' + (e && e.message ? e.message : e));
}
</script>
</body>
</html>
